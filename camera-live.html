<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Live – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root{
  --bg:#0f1115;
  --card:#161922;
  --border:#262b3d;
  --red:#b91c1c;
  --green:#22c55e;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui;
}

.page{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

video{
  width:90vw;
  max-width:420px;
  max-height:100%;
  background:#000;
  border-radius:18px;
  object-fit:contain;
}

/* TIMER */
.timer{
  text-align:center;
  font-size:14px;
  margin:8px 0;
  color:var(--green);
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:24px;
  padding:18px 0 24px;
}

.ctrl{
  width:56px;
  height:56px;
  border-radius:50%;
  border:2px solid var(--border);
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
}

.ctrl.off{
  background:var(--red);
  border-color:var(--red);
}

.ctrl.end{
  background:var(--red);
  border-color:var(--red);
}

.ctrl svg{
  width:24px;
  height:24px;
  fill:#fff;
}
</style>
</head>

<body>

<div class="page">

  <div class="header">Camera • LIVE</div>

  <div class="preview">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="timer" id="focusTimer">Focused: 00:00</div>

  <div class="controls">

    <!-- MIC -->
    <button id="micBtn" class="ctrl" onclick="toggleMic()">
      <svg viewBox="0 0 24 24">
        <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z"/>
        <path d="M19 11a7 7 0 01-14 0"/>
      </svg>
    </button>

    <!-- CAMERA -->
    <button id="camBtn" class="ctrl" onclick="toggleCam()">
      <svg viewBox="0 0 24 24">
        <path d="M17 10.5V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-3.5l4 4v-11l-4 4z"/>
      </svg>
    </button>

    <!-- FLIP CAMERA (FIXED) -->
    <button class="ctrl" onclick="flipCamera()">
      <svg viewBox="0 0 24 24">
        <path d="M12 4a8 8 0 018 8h-2a6 6 0 00-6-6V4z"/>
        <path d="M12 20a8 8 0 01-8-8h2a6 6 0 006 6v2z"/>
      </svg>
    </button>

    <!-- LEAVE -->
    <button class="ctrl end" onclick="leave()">
      <svg viewBox="0 0 24 24">
        <path d="M21 7.5l-3.5-2v4H10v3h7.5v4z"/>
        <path d="M3 5h8v14H3z"/>
      </svg>
    </button>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ======================
   STATE
====================== */
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");
const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");
const focusEl = document.getElementById("focusTimer");

let mediaStream = null;
let videoSender = null;
let micOn = true;
let camOn = true;

/* ✅ FRONT CAMERA DEFAULT */
let facing = "user";

/* ======================
   WEBRTC
====================== */
const socket = io();
const pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

/* ======================
   CAMERA START / FLIP
====================== */
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ ideal:facing } },
    audio:true
  });

  video.srcObject = stream;

  if (!mediaStream) {
    stream.getTracks().forEach(t=>{
      const sender = pc.addTrack(t, stream);
      if (t.kind === "video") videoSender = sender;
    });
  } else {
    await videoSender.replaceTrack(stream.getVideoTracks()[0]);
    mediaStream.getTracks().forEach(t=>t.stop());
  }

  mediaStream = stream;
}

startCamera();

/* JOIN ROOM */
socket.emit("join", streamId);

/* ======================
   CONTROLS
====================== */
function toggleMic(){
  micOn = !micOn;
  mediaStream.getAudioTracks()[0].enabled = micOn;
  micBtn.classList.toggle("off", !micOn);
}

function toggleCam(){
  camOn = !camOn;
  mediaStream.getVideoTracks()[0].enabled = camOn;
  camBtn.classList.toggle("off", !camOn);
}

/* ✅ FLIP WORKS */
async function flipCamera(){
  facing = facing === "user" ? "environment" : "user";
  await startCamera();
}

function leave(){
  pc.close();
  socket.disconnect();
  mediaStream.getTracks().forEach(t=>t.stop());
  location.href = "index.html";
}

/* ======================
   SIGNALING
====================== */
pc.onicecandidate = e=>{
  if(e.candidate){
    socket.emit("signal",{ data:e.candidate });
  }
};

socket.on("signal", async ({from,data})=>{
  if(data.type==="offer"){
    await pc.setRemoteDescription(data);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit("signal",{to:from,data:pc.localDescription});
  }
  if(data.candidate){
    await pc.addIceCandidate(data);
  }
});

/* ======================
   FOCUS / ATTENTION TIMER
====================== */
let focusSeconds = 0;
let lastMotion = Date.now();

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");
canvas.width = 32;
canvas.height = 32;

let lastFrame = null;

setInterval(()=>{
  if (!video.videoWidth) return;

  ctx.drawImage(video,0,0,32,32);
  const frame = ctx.getImageData(0,0,32,32).data;

  if (lastFrame) {
    let diff = 0;
    for (let i=0;i<frame.length;i+=4){
      diff += Math.abs(frame[i]-lastFrame[i]);
    }
    if (diff > 3000) lastMotion = Date.now();
  }
  lastFrame = frame;

  if (Date.now() - lastMotion < 3000){
    focusSeconds++;
    const m = String(Math.floor(focusSeconds/60)).padStart(2,"0");
    const s = String(focusSeconds%60).padStart(2,"0");
    focusEl.textContent = `Focused: ${m}:${s}`;
  }
},1000);
</script>

</body>
</html>
