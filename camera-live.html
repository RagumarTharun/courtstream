<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Live – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root{
  --bg:#0f1115;
  --card:#161922;
  --border:#262b3d;
  --red:#b91c1c;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui;
}

.page{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  height:56px;
  display:flex;
  align-items:center;
}
.header-title{
  flex:1;
  text-align:center;
  font-size:15px;
}
.badge{
  font-size:12px;
  color:#22c55e;
}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
video{
  width:88%;
  max-width:420px;
  aspect-ratio:16/9;
  object-fit:cover;
  background:#000;
  border-radius:18px;
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:18px;
  padding:18px 0 24px;
}
.ctrl{
  width:56px;
  height:56px;
  border-radius:50%;
  border:2px solid var(--border);
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
}
.ctrl.off{
  background:var(--red);
  border-color:var(--red);
}
.ctrl.end{
  background:var(--red);
  border-color:var(--red);
}
.ctrl svg{
  width:24px;
  height:24px;
  fill:#fff;
}
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="header-title">
      Camera • <span class="badge">LIVE</span>
    </div>
  </div>

  <div class="preview">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="controls">

    <!-- MIC -->
    <button id="micBtn" class="ctrl" onclick="toggleMic()">
      🎤
    </button>

    <!-- CAMERA -->
    <button id="camBtn" class="ctrl" onclick="toggleCam()">
      📷
    </button>

    <!-- FLIP CAMERA -->
    <button class="ctrl" onclick="flipCamera()">
      🔄
    </button>

    <!-- ORIENTATION -->
    <button class="ctrl" onclick="toggleOrientation()">
      ↕️
    </button>

    <!-- LEAVE -->
    <button class="ctrl end" onclick="leave()">
      ⏹
    </button>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* =====================
   STATE
===================== */
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");

let mediaStream;
let videoSender;
let micOn = true;
let camOn = true;
let facing = "environment";      // ✅ back camera default
let orientation = "landscape";   // landscape | portrait

const socket = io();
const pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

/* =====================
   CAMERA START
===================== */
async function startCamera(){
  const isLandscape = orientation === "landscape";

  const constraints = {
    video: {
      facingMode: { ideal: facing },
      width: { ideal: isLandscape ? 1280 : 720 },
      height:{ ideal: isLandscape ? 720  : 1280 },
      aspectRatio: isLandscape ? 16/9 : 3/4
    },
    audio:true
  };

  const stream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = stream;

  if (!mediaStream) {
    stream.getTracks().forEach(track=>{
      const sender = pc.addTrack(track, stream);
      if (track.kind === "video") videoSender = sender;
    });
  } else {
    const newVideoTrack = stream.getVideoTracks()[0];
    await videoSender.replaceTrack(newVideoTrack);
    mediaStream.getTracks().forEach(t=>t.stop());
  }

  mediaStream = stream;
}
startCamera();

/* =====================
   JOIN
===================== */
socket.emit("join", streamId);

/* =====================
   CONTROLS
===================== */
function toggleMic(){
  micOn = !micOn;
  mediaStream.getAudioTracks()[0].enabled = micOn;
}

function toggleCam(){
  camOn = !camOn;
  mediaStream.getVideoTracks()[0].enabled = camOn;
}

async function flipCamera(){
  facing = facing === "environment" ? "user" : "environment";
  await startCamera();
}

async function toggleOrientation(){
  orientation = orientation === "landscape" ? "portrait" : "landscape";
  await startCamera();
}

function leave(){
  pc.close();
  socket.disconnect();
  mediaStream.getTracks().forEach(t=>t.stop());
  location.href = "index.html";
}

/* =====================
   WEBRTC
===================== */
pc.onicecandidate = e=>{
  if(e.candidate){
    socket.emit("signal",{ data:e.candidate });
  }
};

socket.on("signal", async ({from,data})=>{
  if(data.type === "offer"){
    await pc.setRemoteDescription(data);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit("signal",{ to:from, data:pc.localDescription });
  }
  if(data.candidate){
    await pc.addIceCandidate(data);
  }
});
</script>

</body>
</html>
