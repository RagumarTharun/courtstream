<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera • LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#0f1115;color:#fff;font-family:system-ui}
video{
  width:100vw;
  height:100vh;
  object-fit:cover;
  background:#000;
}
</style>
</head>

<body>
<video id="video" autoplay muted playsinline></video>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");
const socket = io();

let pc;
let mediaStream;

/* JOIN ROOM */
socket.emit("join",{room:streamId,role:"camera"});

/* RECEIVE OFFER */
socket.on("signal", async ({from,data})=>{
  if(data.sdp && data.sdp.type==="offer"){
    pc = new RTCPeerConnection({
      iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    pc.onicecandidate = e=>{
      if(e.candidate){
        socket.emit("signal",{to:from,data:{candidate:e.candidate}});
      }
    };

    mediaStream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    });

    video.srcObject = mediaStream;
    mediaStream.getTracks().forEach(t=>pc.addTrack(t,mediaStream));

    await pc.setRemoteDescription(data.sdp);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("signal",{to:from,data:{sdp:answer}});
  }

  if(data.candidate){
    await pc.addIceCandidate(data.candidate);
  }
});
</script>
</body>
</html>
