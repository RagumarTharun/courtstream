<script>
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");
const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");

let mediaStream = null;
let videoSender = null;
let micOn = true;
let camOn = true;
let facing = "environment";

const socket = io({ transports:["websocket"] });
const pc = new RTCPeerConnection({
  iceServers:[
    { urls:"stun:stun.l.google.com:19302" }
  ]
});

/* ===== CAMERA ===== */
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ ideal:facing } },
    audio:true
  });

  video.srcObject = stream;

  if (!mediaStream) {
    stream.getTracks().forEach(t=>{
      const sender = pc.addTrack(t, stream);
      if (t.kind === "video") videoSender = sender;
    });
  } else {
    await videoSender.replaceTrack(stream.getVideoTracks()[0]);
    mediaStream.getTracks().forEach(t=>t.stop());
  }

  mediaStream = stream;
}
startCamera();

/* ===== JOIN ===== */
socket.emit("join", {
  room: streamId,
  role: "camera"
});

/* ===== CONTROLS ===== */
function toggleMic(){
  micOn = !micOn;
  mediaStream.getAudioTracks()[0].enabled = micOn;
  micBtn.classList.toggle("off", !micOn);
}
function toggleCam(){
  camOn = !camOn;
  mediaStream.getVideoTracks()[0].enabled = camOn;
  camBtn.classList.toggle("off", !camOn);
}
async function flipCamera(){
  facing = facing === "environment" ? "user" : "environment";
  await startCamera();
}

/* ===== CLEAN SHUTDOWN (CRITICAL) ===== */
function cleanup(){
  try{
    pc.getSenders().forEach(s=>{
      if (s.track) s.track.stop();
    });
    pc.close();
  }catch{}

  socket.disconnect();
  mediaStream?.getTracks().forEach(t=>t.stop());
}

window.addEventListener("beforeunload", cleanup);

/* ===== WEBRTC ===== */
let remoteDescSet = false;
const pendingCandidates = [];

pc.onicecandidate = e=>{
  if(e.candidate){
    socket.emit("signal",{ data:e.candidate });
  }
};

socket.on("signal", async ({from,data})=>{
  if(data.type === "offer"){
    await pc.setRemoteDescription(data);
    remoteDescSet = true;

    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit("signal",{ to:from, data:pc.localDescription });

    // flush queued ICE
    pendingCandidates.splice(0).forEach(c=>pc.addIceCandidate(c));
  }

  if(data.candidate){
    if(remoteDescSet){
      await pc.addIceCandidate(data.candidate);
    } else {
      pendingCandidates.push(data.candidate);
    }
  }
});
</script>
