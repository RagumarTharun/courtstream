<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Live – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root{
  --bg:#0f1115;
  --card:#161922;
  --border:#262b3d;
  --red:#b91c1c;
}
body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui;
}
.page{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
}
.header{
  height:56px;
  display:flex;
  align-items:center;
}
.header-title{
  flex:1;
  text-align:center;
  font-size:15px;
}
.badge{ color:#22c55e; font-size:12px; }
.preview{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
video{
  width:88%;
  max-width:420px;
  aspect-ratio:3/4;
  object-fit:cover;
  background:#000;
  border-radius:18px;
}
.controls{
  display:flex;
  justify-content:center;
  gap:24px;
  padding:18px 0 24px;
}
.ctrl{
  width:56px;
  height:56px;
  border-radius:50%;
  border:2px solid var(--border);
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
}
.ctrl.off{
  background:var(--red);
  border-color:var(--red);
}
.ctrl.end{
  background:var(--red);
}
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="header-title">
      Camera • <span class="badge">LIVE</span>
    </div>
  </div>

  <div class="preview">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="controls">
    <button id="micBtn" class="ctrl" onclick="toggleMic()">🎤</button>
    <button id="camBtn" class="ctrl" onclick="toggleCam()">📷</button>
    <button class="ctrl" onclick="flip()">🔄</button>
    <button class="ctrl end" onclick="leave()">⏹</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* =========================
   STATE
========================= */
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");
const socket = io();

let mediaStream;
let videoSender;
let micOn = true;
let camOn = true;
let facing = "environment"; // ✅ BACK CAMERA DEFAULT

const pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

/* =========================
   MEDIA
========================= */
async function startMedia(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ exact:facing } },
    audio:true
  });

  video.srcObject = stream;

  if (!mediaStream) {
    stream.getTracks().forEach(track=>{
      const sender = pc.addTrack(track, stream);
      if (track.kind === "video") videoSender = sender;
    });
  } else {
    // replace tracks safely
    const newVideoTrack = stream.getVideoTracks()[0];
    await videoSender.replaceTrack(newVideoTrack);

    mediaStream.getTracks().forEach(t=>t.stop());
  }

  mediaStream = stream;
}
startMedia();

/* =========================
   JOIN
========================= */
socket.emit("join", streamId);

/* =========================
   CONTROLS
========================= */
function toggleMic(){
  micOn = !micOn;
  mediaStream.getAudioTracks()[0].enabled = micOn;
}

function toggleCam(){
  camOn = !camOn;
  mediaStream.getVideoTracks()[0].enabled = camOn;
}

async function flip(){
  facing = facing === "environment" ? "user" : "environment";
  await startMedia(); // ✅ NO renegotiation needed
}

function leave(){
  pc.close();
  socket.disconnect();
  mediaStream.getTracks().forEach(t=>t.stop());
  location.href = "index.html";
}

/* =========================
   WEBRTC SIGNALING
========================= */
pc.onicecandidate = e=>{
  if(e.candidate){
    socket.emit("signal",{ data:e.candidate });
  }
};

socket.on("signal", async ({from,data})=>{
  if(data.type === "offer"){
    await pc.setRemoteDescription(data);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit("signal",{ to:from, data:pc.localDescription });
  }
  if(data.candidate){
    await pc.addIceCandidate(data);
  }
});
</script>

</body>
</html>
