<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Live – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root{
  --bg:#0f1115;
  --card:#161922;
  --border:#262b3d;
  --red:#b91c1c;
}
body{margin:0;background:var(--bg);font-family:system-ui;color:#fff}
.page{position:fixed;inset:0;display:flex;flex-direction:column}
.header{height:56px;display:flex;align-items:center;justify-content:center}
.preview{flex:1;display:flex;align-items:center;justify-content:center}
video{width:88%;max-width:420px;aspect-ratio:3/4;background:#000;border-radius:18px;object-fit:cover}
.controls{display:flex;justify-content:center;gap:24px;padding:18px 0 24px}
.ctrl{width:56px;height:56px;border-radius:50%;border:2px solid var(--border);background:var(--card)}
.ctrl.off,.ctrl.end{background:var(--red);border-color:var(--red)}
.ctrl svg{width:24px;height:24px;fill:#fff}
</style>
</head>

<body>
<div class="page">

<div class="header">Camera • LIVE</div>

<div class="preview">
  <video id="video" autoplay muted playsinline></video>
</div>

<div class="controls">
  <button id="micBtn" class="ctrl" onclick="toggleMic()"></button>
  <button id="camBtn" class="ctrl" onclick="toggleCam()"></button>
  <button class="ctrl" onclick="flip()"></button>
  <button class="ctrl end" onclick="leave()"></button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");

let mediaStream;
let micOn = true;
let camOn = true;
let facing = "user";
let directorId = null;

const socket = io();
const pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

/* GET CAMERA PREVIEW */
async function startPreview(){
  if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop());
  mediaStream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:facing},
    audio:true
  });
  video.srcObject = mediaStream;
}
startPreview();

/* JOIN */
socket.emit("join",{room:streamId,role:"camera"});

/* RECEIVE OFFER */
socket.on("signal", async ({from,data})=>{
  if(data.sdp && data.sdp.type==="offer"){
    directorId = from;
    await pc.setRemoteDescription(data.sdp);

    // ✅ ADD TRACKS AFTER OFFER
    mediaStream.getTracks().forEach(t=>pc.addTrack(t,mediaStream));

    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    socket.emit("signal",{to:from,data:{sdp:ans}});
  }

  if(data.candidate){
    await pc.addIceCandidate(data.candidate);
  }
});

/* ICE */
pc.onicecandidate = e=>{
  if(e.candidate && directorId){
    socket.emit("signal",{
      to:directorId,
      data:{candidate:e.candidate}
    });
  }
};

/* CONTROLS */
function toggleMic(){
  micOn=!micOn;
  mediaStream.getAudioTracks()[0].enabled = micOn;
}
function toggleCam(){
  camOn=!camOn;
  mediaStream.getVideoTracks()[0].enabled = camOn;
}
async function flip(){
  facing = facing==="user"?"environment":"user";
  await startPreview();
}

/* LEAVE */
function leave(){
  pc.close();
  socket.disconnect();
  mediaStream.getTracks().forEach(t=>t.stop());
  location.href="index.html";
}
</script>
</body>
</html>
