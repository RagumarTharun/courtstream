<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera • LIVE</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{margin:0;background:#0f1115;color:#fff;font-family:system-ui}
video{width:100%;height:100vh;object-fit:cover}
.controls{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:16px}
button{width:56px;height:56px;border-radius:50%;border:none;background:#222;color:white;font-size:14px}
.off{background:#b91c1c}
</style>
</head>

<body>

<video id="v" autoplay muted playsinline></video>

<div class="controls">
  <button id="mic">Mic</button>
  <button id="cam">Cam</button>
  <button id="flip">Flip</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const v = document.getElementById("v");

let stream;
let facing = "user";

const socket = io();
const pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

/* MEDIA */
async function start(){
  stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:facing},
    audio:true
  });
  v.srcObject = stream;
  stream.getTracks().forEach(t => pc.addTrack(t, stream));
}
start();

/* JOIN */
socket.emit("join",{room:streamId,role:"camera"});

/* WEBRTC */
pc.onicecandidate = e => {
  if (e.candidate) {
    socket.emit("signal",{data:{candidate:e.candidate}});
  }
};

socket.on("signal", async ({from,data}) => {
  if (data.sdp) {
    await pc.setRemoteDescription(data.sdp);
    if (data.sdp.type === "offer") {
      const ans = await pc.createAnswer();
      await pc.setLocalDescription(ans);
      socket.emit("signal",{to:from,data:{sdp:ans}});
    }
  }
  if (data.candidate) {
    await pc.addIceCandidate(data.candidate);
  }
});

/* CONTROLS */
mic.onclick = () => {
  const t = stream.getAudioTracks()[0];
  t.enabled = !t.enabled;
  mic.classList.toggle("off", !t.enabled);
};

cam.onclick = () => {
  const t = stream.getVideoTracks()[0];
  t.enabled = !t.enabled;
  cam.classList.toggle("off", !t.enabled);
};

flip.onclick = async () => {
  facing = facing === "user" ? "environment" : "user";
  stream.getTracks().forEach(t=>t.stop());
  await start();
};
</script>
</body>
</html>
