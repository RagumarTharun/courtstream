<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Live – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
/* === UI UNCHANGED === */
:root{
  --bg:#0f1115;
  --card:#161922;
  --border:#262b3d;
  --red:#b91c1c;
}
body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui;
}
.page{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
}
.header{height:56px;display:flex;align-items:center;}
.header-title{flex:1;text-align:center;font-size:15px;}
.badge{font-size:12px;color:#22c55e;}
.preview{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
video{
  width:90vw;
  max-width:420px;
  aspect-ratio:16/9;
  background:#000;
  border-radius:18px;
  object-fit:cover;
}
.rotate-portrait video{
  transform:rotate(90deg) scale(1.3);
}
.controls{
  display:flex;
  justify-content:center;
  gap:24px;
  padding:18px 0 24px;
}
.ctrl{
  width:56px;height:56px;border-radius:50%;
  border:2px solid var(--border);
  background:var(--card);
  display:flex;align-items:center;justify-content:center;
}
.ctrl.off{background:var(--red);border-color:var(--red);}
.ctrl.end{background:var(--red);border-color:var(--red);}
.ctrl svg{width:24px;height:24px;fill:#fff;}
</style>
</head>

<body>

<div class="page" id="page">
  <div class="header">
    <div class="header-title">
      Camera • <span class="badge">LIVE</span>
    </div>
  </div>

  <div class="preview">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="controls">
    <button id="micBtn" class="ctrl" onclick="toggleMic()">🎤</button>
    <button id="camBtn" class="ctrl" onclick="toggleCam()">📷</button>
    <button class="ctrl" onclick="flipCamera()">🔄</button>
    <button class="ctrl end" onclick="leave()">⏹</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ===== STATE ===== */
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");
const page = document.getElementById("page");
const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");

let stream;
let micOn = true;
let camOn = true;
let facing = "environment";

const socket = io();
const pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

/* 🔑 REQUIRED FOR SENDING VIDEO */
pc.addTransceiver("video", { direction:"sendonly" });

/* JOIN — FIXED PAYLOAD */
socket.emit("join", {
  room: streamId,
  role: "camera"
});

/* ===== SIGNALING ===== */
socket.on("signal", async ({from, data}) => {

  if (data.type === "offer") {
    // start camera ONLY after offer
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:facing },
      audio:true
    });

    video.srcObject = stream;
    stream.getTracks().forEach(t => pc.addTrack(t, stream));

    await pc.setRemoteDescription(data);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    socket.emit("signal", {
      to: from,
      data: pc.localDescription
    });
  }

  if (data.candidate) {
    await pc.addIceCandidate(data);
  }
});

pc.onicecandidate = e=>{
  if(e.candidate){
    socket.emit("signal",{ data:e.candidate });
  }
};

/* ===== CONTROLS ===== */
function toggleMic(){
  micOn = !micOn;
  stream.getAudioTracks()[0].enabled = micOn;
  micBtn.classList.toggle("off", !micOn);
}

function toggleCam(){
  camOn = !camOn;
  stream.getVideoTracks()[0].enabled = camOn;
  camBtn.classList.toggle("off", !camOn);
}

async function flipCamera(){
  facing = facing==="environment" ? "user" : "environment";

  stream.getTracks().forEach(t=>t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:facing },
    audio:true
  });

  video.srcObject = stream;
  pc.getSenders().forEach(s=>{
    if(s.track && s.track.kind==="video"){
      s.replaceTrack(stream.getVideoTracks()[0]);
    }
  });
}

function leave(){
  pc.close();
  socket.disconnect();
  stream.getTracks().forEach(t=>t.stop());
  location.href="index.html";
}

/* ROTATION UI */
function handleOrientation(){
  if (window.matchMedia("(orientation: portrait)").matches)
    page.classList.add("rotate-portrait");
  else
    page.classList.remove("rotate-portrait");
}
window.addEventListener("orientationchange", handleOrientation);
handleOrientation();
</script>

</body>
</html>
