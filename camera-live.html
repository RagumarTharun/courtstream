<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#0f1115;color:#fff;font-family:system-ui}
video{width:90vw;max-width:420px;border-radius:18px;background:#000;object-fit:contain}
.controls{display:flex;justify-content:center;gap:24px;padding:20px}
.ctrl{width:56px;height:56px;border-radius:50%;background:#161922;border:2px solid #262b3d}
.ctrl.off{background:#b91c1c}
#focusBox{position:fixed;top:16px;right:16px;background:#161922;padding:10px 14px;border-radius:12px;font-size:13px}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline></video>

<div class="controls">
  <button id="micBtn" class="ctrl" onclick="toggleMic()">🎤</button>
  <button id="camBtn" class="ctrl" onclick="toggleCam()">📷</button>
  <button class="ctrl" onclick="flipCamera()">🔄</button>
</div>

<div id="focusBox">
  <div id="focusState">Analyzing…</div>
  Focus: <span id="focusTime">0</span>s |
  Away: <span id="awayTime">0</span>s
</div>

<canvas id="analyzer" width="160" height="120" hidden></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");
const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");

let mediaStream, videoSender;
let micOn=true, camOn=true;
let facing="user"; // ✅ FRONT CAMERA DEFAULT

const socket = io();
const pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});

async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:facing}}, audio:true
  });
  video.srcObject = stream;

  if(!mediaStream){
    stream.getTracks().forEach(t=>{
      const s = pc.addTrack(t,stream);
      if(t.kind==="video") videoSender=s;
    });
  }else{
    await videoSender.replaceTrack(stream.getVideoTracks()[0]);
    mediaStream.getTracks().forEach(t=>t.stop());
  }
  mediaStream=stream;
}
startCamera();

socket.emit("join", streamId);

/* CONTROLS */
function toggleMic(){
  micOn=!micOn;
  mediaStream.getAudioTracks()[0].enabled=micOn;
  micBtn.classList.toggle("off",!micOn);
}
function toggleCam(){
  camOn=!camOn;
  mediaStream.getVideoTracks()[0].enabled=camOn;
  camBtn.classList.toggle("off",!camOn);
}
async function flipCamera(){
  facing = facing==="user"?"environment":"user";
  await startCamera();
}

/* WEBRTC */
pc.onicecandidate=e=>e.candidate&&socket.emit("signal",{data:e.candidate});
socket.on("signal",async({from,data})=>{
  if(data.type==="offer"){
    await pc.setRemoteDescription(data);
    const ans=await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit("signal",{to:from,data:ans});
  }
  if(data.candidate) await pc.addIceCandidate(data);
});

/* ===== FOCUS DETECTION ===== */
const canvas=document.getElementById("analyzer");
const ctx=canvas.getContext("2d");
let last=null, focus=0, away=0;

function analyze(){
  if(!video.videoWidth) return;
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const f=ctx.getImageData(0,0,canvas.width,canvas.height);

  let diff=0;
  if(last){
    for(let i=0;i<f.data.length;i+=4){
      diff+=Math.abs(f.data[i]-last.data[i]);
    }
  }
  last=f;

  const focused = diff>200 && diff<6000;
  if(focused){focus++;document.getElementById("focusState").innerText="Focused";}
  else{away++;document.getElementById("focusState").innerText="Not Focused";}

  document.getElementById("focusTime").innerText=focus;
  document.getElementById("awayTime").innerText=away;

  socket.emit("focus-update",{focused:focus,away,state:focused?"Focused":"Not Focused"});
}
setInterval(analyze,1000);
</script>
</body>
</html>
