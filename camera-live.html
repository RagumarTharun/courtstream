<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Live – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root{
  --bg:#0f1115;
  --card:#161922;
  --border:#262b3d;
  --red:#b91c1c;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui;
}

.page{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  height:56px;
  display:flex;
  align-items:center;
}
.header-title{
  flex:1;
  text-align:center;
  font-size:15px;
}
.badge{
  font-size:12px;
  color:#22c55e;
}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

video{
  width:90vw;
  max-width:420px;
  max-height:100%;
  background:#000;
  border-radius:18px;
  object-fit:contain; /* 🔑 EXACT phone preview */
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:24px;
  padding:18px 0 24px;
}

.ctrl{
  width:56px;
  height:56px;
  border-radius:50%;
  border:2px solid var(--border);
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
}

.ctrl.off{
  background:var(--red);
  border-color:var(--red);
}

.ctrl.end{
  background:var(--red);
  border-color:var(--red);
}

.ctrl svg{
  width:24px;
  height:24px;
  fill:#fff;
}
</style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="header-title">
      Camera • <span class="badge">LIVE</span>
    </div>
  </div>

  <div class="preview">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="controls">

    <!-- MIC -->
    <button id="micBtn" class="ctrl" onclick="toggleMic()">
      <svg viewBox="0 0 24 24">
        <path d="M12 14a3 3 0 003-3V5a3 3 0 10-6 0v6a3 3 0 003 3z"/>
        <path d="M19 11a7 7 0 01-14 0"/>
      </svg>
    </button>

    <!-- CAMERA -->
    <button id="camBtn" class="ctrl" onclick="toggleCam()">
      <svg viewBox="0 0 24 24">
        <path d="M17 10.5V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-3.5l4 4v-11l-4 4z"/>
      </svg>
    </button>

    <!-- FLIP CAMERA -->
    <button class="ctrl" onclick="flipCamera()">
      <svg viewBox="0 0 24 24">
        <path d="M12 5v2a5 5 0 015 5h2a7 7 0 00-7-7z"/>
        <path d="M12 19v-2a5 5 0 01-5-5H5a7 7 0 007 7z"/>
      </svg>
    </button>

    <!-- LEAVE -->
    <button class="ctrl end" onclick="leave()">
      <svg viewBox="0 0 24 24">
        <path d="M21 7.5l-3.5-2v4H10v3h7.5v4z"/>
        <path d="M3 5h8v14H3z"/>
      </svg>
    </button>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ================= STATE ================= */
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");
const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");

let mediaStream = null;
let videoSender = null;
let micOn = true;
let camOn = true;
let facing = "environment"; // ✅ back camera default

const socket = io({ transports:["websocket"] });
const pc = new RTCPeerConnection({
  iceServers:[{ urls:"stun:stun.l.google.com:19302" }]
});

/* ================= CAMERA ================= */
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ ideal:facing } },
    audio:true
  });

  video.srcObject = stream;

  if(!mediaStream){
    stream.getTracks().forEach(t=>{
      const sender = pc.addTrack(t, stream);
      if(t.kind === "video") videoSender = sender;
    });
  } else {
    await videoSender.replaceTrack(stream.getVideoTracks()[0]);
    mediaStream.getTracks().forEach(t=>t.stop());
  }

  mediaStream = stream;
}
startCamera();

/* ================= JOIN ================= */
socket.emit("join", {
  room: streamId,
  role: "camera"
});

/* ================= CONTROLS ================= */
function toggleMic(){
  micOn = !micOn;
  mediaStream.getAudioTracks()[0].enabled = micOn;
  micBtn.classList.toggle("off", !micOn);
}

function toggleCam(){
  camOn = !camOn;
  mediaStream.getVideoTracks()[0].enabled = camOn;
  camBtn.classList.toggle("off", !camOn);
}

async function flipCamera(){
  facing = facing === "environment" ? "user" : "environment";
  await startCamera();
}

function leave(){
  cleanup();
  location.href = "index.html";
}

/* ================= CLEANUP (CRITICAL) ================= */
function cleanup(){
  try{
    pc.getSenders().forEach(s=>s.track && s.track.stop());
    pc.close();
  }catch{}
  socket.disconnect();
  mediaStream?.getTracks().forEach(t=>t.stop());
}

window.addEventListener("beforeunload", cleanup);

/* ================= WEBRTC ================= */
let remoteSet = false;
const pendingICE = [];

pc.onicecandidate = e=>{
  if(e.candidate){
    socket.emit("signal",{ data:e.candidate });
  }
};

socket.on("signal", async ({from,data})=>{
  if(data.type === "offer"){
    await pc.setRemoteDescription(data);
    remoteSet = true;

    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit("signal",{ to:from, data:pc.localDescription });

    pendingICE.splice(0).forEach(c=>pc.addIceCandidate(c));
  }

  if(data.candidate){
    if(remoteSet){
      await pc.addIceCandidate(data.candidate);
    } else {
      pendingICE.push(data.candidate);
    }
  }
});
</script>

</body>
</html>
