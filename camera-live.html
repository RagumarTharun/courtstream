<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:black}
video{width:100vw;height:100vh;object-fit:cover}
</style>
</head>

<body>
<video id="local" autoplay playsinline muted></video>

<script src="/socket.io/socket.io.js"></script>
<script>
if (location.protocol !== "https:") {
  document.body.innerHTML =
    "<h2 style='padding:20px'>❌ Open using HTTPS</h2>";
  throw new Error("HTTPS required");
}

const socket = io();
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("local");

let pc, stream;

/* START CAMERA */
(async ()=>{
  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" },
    audio:false
  });
  video.srcObject = stream;
  socket.emit("join", streamId);
})();

/* SIGNAL */
socket.on("signal", async ({from,data})=>{
  if (data.type === "offer") {
    pc = new RTCPeerConnection({
      iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    stream.getTracks().forEach(t => pc.addTrack(t, stream));

    pc.onicecandidate = e =>
      e.candidate && socket.emit("signal", { to:from, data:e.candidate });

    await pc.setRemoteDescription(data);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit("signal", { to:from, data:answer });
  }

  if (data.candidate && pc) await pc.addIceCandidate(data);
});
</script>
</body>
</html>
