<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Live – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root{
  --bg:#0f1115;
  --card:#161922;
  --border:#262b3d;
  --red:#b91c1c;
}
body{margin:0;background:var(--bg);color:#fff;font-family:system-ui}
.page{position:fixed;inset:0;display:flex;flex-direction:column}
.header{height:56px;display:flex;align-items:center}
.header-title{flex:1;text-align:center;font-size:15px}
.badge{font-size:12px;color:#22c55e}
.preview{flex:1;display:flex;align-items:center;justify-content:center}
video{width:90vw;max-width:420px;max-height:100%;background:#000;border-radius:18px;object-fit:contain}
.controls{display:flex;justify-content:center;gap:24px;padding:18px 0 24px}
.ctrl{width:56px;height:56px;border-radius:50%;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center}
.ctrl.off{background:var(--red);border-color:var(--red)}
.ctrl.end{background:var(--red);border-color:var(--red)}
.ctrl svg{width:24px;height:24px;fill:#fff}
</style>
</head>

<body>
<div class="page">

  <div class="header">
    <div class="header-title">Camera • <span class="badge">LIVE</span></div>
  </div>

  <div class="preview">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="controls">
    <button id="micBtn" class="ctrl" onclick="toggleMic()">🎤</button>
    <button id="camBtn" class="ctrl" onclick="toggleCam()">📷</button>
    <button class="ctrl" onclick="flipCamera()">🔄</button>
    <button class="ctrl end" onclick="leave()">⛔</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const video = document.getElementById("video");
const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");

let mediaStream;
let videoSender;
let micOn = true;
let camOn = true;
let facing = "environment";

const socket = io();
const pc = new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ ideal:facing } },
    audio:true
  });

  video.srcObject = stream;

  if (!mediaStream) {
    stream.getTracks().forEach(t=>{
      const sender = pc.addTrack(t, stream);
      if (t.kind === "video") videoSender = sender;
    });
  } else {
    await videoSender.replaceTrack(stream.getVideoTracks()[0]);
    mediaStream.getTracks().forEach(t=>t.stop());
  }

  mediaStream = stream;
}
startCamera();

/* JOIN */
socket.emit("join", streamId);

/* CONTROLS */
function toggleMic(){
  micOn = !micOn;
  mediaStream.getAudioTracks()[0].enabled = micOn;
  micBtn.classList.toggle("off", !micOn);
}
function toggleCam(){
  camOn = !camOn;
  mediaStream.getVideoTracks()[0].enabled = camOn;
  camBtn.classList.toggle("off", !camOn);
}
async function flipCamera(){
  facing = facing === "environment" ? "user" : "environment";
  await startCamera();
}
function leave(){
  pc.close();
  socket.disconnect();
  mediaStream.getTracks().forEach(t=>t.stop());
  location.href = "index.html";
}

/* WEBRTC */
pc.onicecandidate = e=>{
  if(e.candidate){
    socket.emit("signal",{ data:e.candidate });
  }
};
socket.on("signal", async ({from,data})=>{
  if(data.type === "offer"){
    await pc.setRemoteDescription(data);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    socket.emit("signal",{ to:from, data:pc.localDescription });
  }
  if(data.candidate){
    await pc.addIceCandidate(data);
  }
});
</script>
</body>
</html>
