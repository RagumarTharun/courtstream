<!DOCTYPE html>
<html>
<head>
  <title>🎬 Court Stream </title>
 
  <style>
    body {
      font-family: Arial;
      background:#f3f3f3;
      padding:12px; 
    }

    #top {
      display:flex;
      gap:10px;
      align-items:center;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    #videos {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:14px;
    }

    .camera-box {
      background:white;
      padding:6px;
      border-radius:8px;
      box-shadow:0 4px 10px rgba(0,0,0,.15);
    }

    video {
      width:100%;
      border-radius:6px;
      background:black;
    }

    .controls {
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-top:6px;
    }

    .row {
      display:flex;
      gap:6px;
      align-items:center;
    }

    input {
      padding:4px;
      font-size:12px;
    }

    button {
      padding:6px 10px;
      border:none;
      border-radius:6px;
      background:#444;
      color:white;
      font-size:12px;
      cursor:pointer;
    }

    #program {
      position:fixed;
      top:12px;
      right:12px;
      width:320px;
      border:3px solid red;
      background:black;
      padding:4px;
      border-radius:8px;
      z-index:10;
    }

    #timer { font-weight:bold; }
    .recording { background:red; }

    #qrBox {
      background:white;
      padding:10px;
      border-radius:8px;
      box-shadow:0 4px 10px rgba(0,0,0,.15);
      margin-bottom:12px;
      display:none;
    }
  </style>
</head>

<body>

<h2>🎬 Courts Stream </h2>

<div id="top">
  <button id="recordBtn">▶ Start Recording</button>
  <span id="timer">00:00</span>
  <button id="qrBtn">📱 Scan QR</button>
</div>

<div id="qrBox">
  <b>Scan with phone to join as camera</b><br><br>
  <canvas id="qrCanvas"></canvas>
</div>

<div id="videos"></div>

<div id="program">
  <video id="programVideo" autoplay muted playsinline></video>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
/* =====================
   CORE STATE
===================== */
const socket = io();
const room = "room1";

const peers = {};
const streams = {};
const recorders = {};
const chunks = {};
const cameraNames = {};

let activeProgramVideo = null;
let isRecording = false;
let seconds = 0;
let timerInt;

/* =====================
   PROGRAM COMPOSITOR
===================== */
const programCanvas = document.createElement("canvas");
programCanvas.width = 1280;
programCanvas.height = 720;
const programCtx = programCanvas.getContext("2d");

const programStream = programCanvas.captureStream(30);
const programVideo = document.getElementById("programVideo");
programVideo.srcObject = programStream;

let programRecorder;
let programChunks = [];

/* =====================
   QR CODE (🔥 Cloudflare-safe)
===================== */
const qrBtn = document.getElementById("qrBtn");
const qrBox = document.getElementById("qrBox");
const qrCanvas = document.getElementById("qrCanvas");

qrBtn.onclick = () => {
  qrBox.style.display = qrBox.style.display === "none" ? "block" : "none";
  const url = `${location.origin}/phone.html?room=${room}`;
  QRCode.toCanvas(qrCanvas, url, { width:220, margin:1 });
};

/* =====================
   SOCKET JOIN
===================== */
socket.emit("join", room);

socket.on("existing-peers", list => list.forEach(p => createPeer(p.id)));
socket.on("peer-joined", p => createPeer(p.id));

/* =====================
   PEER CONNECTION
===================== */
async function createPeer(id){
  if (peers[id]) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peers[id] = pc;
  pc.addTransceiver("video",{direction:"recvonly"});

  pc.ontrack = e => addOrUpdateCamera(id, e.streams[0]);

  pc.onicecandidate = e =>
    e.candidate && socket.emit("signal",{to:id,data:e.candidate});

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("signal",{to:id,data:offer});
}

socket.on("signal", async ({from,data})=>{
  const pc = peers[from];
  if (!pc) return;
  if (data.type==="answer") await pc.setRemoteDescription(data);
  if (data.candidate) await pc.addIceCandidate(data);
});

/* =====================
   CAMERA UI (🔥 FLIP-SAFE)
===================== */
function addOrUpdateCamera(id, stream) {
  let box = document.getElementById(id);

  if (box) {
    const video = box.querySelector("video");
    video.srcObject = null;
    video.srcObject = stream;
    video.play();
    streams[id] = stream;
    return;
  }

  streams[id] = stream;
  cameraNames[id] = `Camera_${id.slice(0,4)}`;

  box = document.createElement("div");
  box.className = "camera-box";
  box.id = id;

  const video = document.createElement("video");
  video.srcObject = stream;
  video.autoplay = true;
  video.muted = true;

  const controls = document.createElement("div");
  controls.className = "controls";

  const nameInput = document.createElement("input");
  nameInput.value = cameraNames[id];
  nameInput.oninput = e => cameraNames[id] = e.target.value;

  const liveBtn = document.createElement("button");
  liveBtn.innerText = "GO LIVE";
  liveBtn.onclick = () => activeProgramVideo = video;

  const row = document.createElement("div");
  row.className = "row";
  row.append(liveBtn);

  controls.append(nameInput, row);
  box.append(video, controls);
  document.getElementById("videos").appendChild(box);

  /* Per-camera recorder */
  const rec = new MediaRecorder(stream);
  recorders[id] = rec;
  chunks[id] = [];

  rec.ondataavailable = e => e.data.size && chunks[id].push(e.data);
  rec.onstop = () => {
    const blob = new Blob(chunks[id],{type:"video/webm"});
    chunks[id] = [];
    const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${cameraNames[id]}_${ts}.webm`;
    a.click();
  };
}

/* =====================
   CAMERA REMOVAL (🔥 EXIT-SAFE)
===================== */
socket.on("camera-left", ({ id }) => {
  if (streams[id]) {
    streams[id].getTracks().forEach(t => t.stop());
    delete streams[id];
  }

  if (recorders[id]) {
    try {
      if (recorders[id].state !== "inactive") recorders[id].stop();
    } catch {}
    delete recorders[id];
    delete chunks[id];
  }

  const el = document.getElementById(id);
  if (el) el.remove();

  if (activeProgramVideo && !document.body.contains(activeProgramVideo)) {
    activeProgramVideo = null;
  }
});

/* =====================
   PROGRAM RENDER LOOP
===================== */
function renderProgram(){
  programCtx.fillStyle = "black";
  programCtx.fillRect(0,0,programCanvas.width,programCanvas.height);

  if (
    activeProgramVideo &&
    activeProgramVideo.readyState >= 2 &&
    activeProgramVideo.videoWidth > 0
  ) {
    const vw = activeProgramVideo.videoWidth;
    const vh = activeProgramVideo.videoHeight;
    const cw = programCanvas.width;
    const ch = programCanvas.height;

    const ar = vw / vh;
    let dw = cw;
    let dh = cw / ar;
    if (dh > ch) {
      dh = ch;
      dw = ch * ar;
    }

    const x = (cw - dw) / 2;
    const y = (ch - dh) / 2;
    programCtx.drawImage(activeProgramVideo, x, y, dw, dh);
  }

  requestAnimationFrame(renderProgram);
}
renderProgram();

/* =====================
   RECORDING
===================== */
const recordBtn = document.getElementById("recordBtn");
const timer = document.getElementById("timer");

recordBtn.onclick = () => {
  isRecording = !isRecording;
  recordBtn.classList.toggle("recording", isRecording);
  recordBtn.innerText = isRecording ? "⏹ Stop Recording" : "▶ Start Recording";

  if (isRecording) {
    seconds = 0;
    timerInt = setInterval(() => {
      seconds++;
      timer.innerText =
        `${String(seconds/60|0).padStart(2,"0")}:${String(seconds%60).padStart(2,"0")}`;
    }, 1000);

    Object.values(recorders).forEach(r => r.start());

    programRecorder = new MediaRecorder(programStream);
    programChunks = [];
    programRecorder.ondataavailable = e => e.data.size && programChunks.push(e.data);
    programRecorder.onstop = () => {
      const blob = new Blob(programChunks,{type:"video/webm"});
      const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `PROGRAM_FINAL_${ts}.webm`;
      a.click();
    };
    programRecorder.start();

  } else {
    clearInterval(timerInt);
    Object.values(recorders).forEach(r => r.stop());
    programRecorder.stop();
  }
};
</script>

</body>
</html>
