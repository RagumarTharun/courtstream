<!DOCTYPE html>
<html>
<head>
  <title>CourtStream – Director (Meet Style)</title>

  <style>
    :root {
      --bg-primary: #0f1115;
      --bg-panel: #161922;
      --border: #262b3d;

      --text-primary: #e6e6eb;
      --text-muted: #9aa0b4;

      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, Ubuntu, Cantarell;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== TOP BAR (MEET STYLE) ===== */
    #topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
    }

    #title {
      font-weight: 600;
      font-size: 14px;
    }

    #controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .recording {
      background: var(--danger);
      border-color: var(--danger);
      color: white !important;
    }

    #timer {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 8px;
    }

    /* ===== MAIN AREA ===== */
    #main {
      flex: 1;
      display: flex;
      padding: 12px;
      gap: 12px;
      overflow: hidden;
    }

    /* ===== MAIN FEED ===== */
    #program {
      flex: 3;
      background: black;
      border-radius: 12px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #program video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 12px;
    }

    #recordOverlay {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(0,0,0,0.6);
      padding: 8px 14px;
      border-radius: 999px;
    }

    /* ===== CAMERA GRID (MEET STYLE) ===== */
    #videos {
      flex: 1.3;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      overflow-y: auto;
    }

    .camera-box {
      background: black;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 16 / 9;
    }

    .camera-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .camera-label {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 11px;
    }

    /* ===== QR MODAL ===== */
    #qrBox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    #qrInner {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="topbar">
  <div id="title">CourtStream – Live Session</div>
  <div id="controls">
    <button id="qrBtn">Add camera</button>
    <button id="recordBtn">Record</button>
    <span id="timer">00:00</span>
  </div>
</div>

<div id="main">
  <div id="program">
    <video id="programVideo" autoplay muted playsinline></video>

    <div id="recordOverlay">
      <button id="recordBtnOverlay">● Record</button>
    </div>
  </div>

  <div id="videos"></div>
</div>

<div id="qrBox">
  <div id="qrInner">
    <strong>Scan to join</strong><br><br>
    <canvas id="qrCanvas"></canvas><br><br>
    <button onclick="qrBox.style.display='none'">Close</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
/* =======================
   CORE STATE
======================= */
const socket = io();
const room = "room1";

const peers = {};
const recorders = {};
const chunks = {};
const cameraNames = {};

let isRecording = false;
let seconds = 0;
let timerInt;

/* =======================
   PROGRAM COMPOSITOR
======================= */
const programCanvas = document.createElement("canvas");
programCanvas.width = 1280;
programCanvas.height = 720;
const programCtx = programCanvas.getContext("2d");

let activeProgramVideo = null;
let programStream = programCanvas.captureStream(30);
let programRecorder = null;
let programChunks = [];

const programVideo = document.getElementById("programVideo");
programVideo.srcObject = programStream;

/* =======================
   QR
======================= */
const qrBtn = document.getElementById("qrBtn");
const qrBox = document.getElementById("qrBox");
const qrCanvas = document.getElementById("qrCanvas");
const cameraURL = `${location.origin}/phone.html?room=${room}`;

qrBtn.onclick = () => {
  qrBox.style.display = "flex";
  QRCode.toCanvas(qrCanvas, cameraURL, { width:220, margin:1 });
};

/* =======================
   SOCKET
======================= */
socket.emit("join", room);

socket.on("existing-peers", list => list.forEach(p => createPeer(p.id)));
socket.on("peer-joined", p => createPeer(p.id));

async function createPeer(id){
  if (peers[id]) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peers[id] = pc;
  pc.addTransceiver("video",{direction:"recvonly"});
  pc.ontrack = e => addCamera(id, e.streams[0]);
  pc.onicecandidate = e =>
    e.candidate && socket.emit("signal",{to:id,data:e.candidate});

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("signal",{to:id,data:offer});
}

socket.on("signal", async ({from,data})=>{
  const pc = peers[from];
  if (!pc) return;
  if (data.type==="answer") await pc.setRemoteDescription(data);
  if (data.candidate) await pc.addIceCandidate(data);
});

/* =======================
   CAMERA UI
======================= */
function addCamera(id, stream){
  if (document.getElementById(id)) return;

  cameraNames[id] = `Camera_${id.slice(0,4)}`;

  const box = document.createElement("div");
  box.className = "camera-box";
  box.id = id;

  const video = document.createElement("video");
  video.srcObject = stream;
  video.autoplay = true;
  video.muted = true;

  const label = document.createElement("div");
  label.className = "camera-label";
  label.innerText = cameraNames[id];

  box.onclick = () => activeProgramVideo = video;

  box.append(video,label);
  document.getElementById("videos").appendChild(box);

  const rec = new MediaRecorder(stream);
  recorders[id] = rec;
  chunks[id] = [];

  rec.ondataavailable = e => e.data.size && chunks[id].push(e.data);

  rec.onstop = ()=>{
    const blob = new Blob(chunks[id],{type:"video/webm"});
    chunks[id]=[];
    const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`${cameraNames[id]}_${ts}.webm`;
    a.click();
  };
}

/* =======================
   PROGRAM RENDER
======================= */
function renderProgram(){
  programCtx.fillStyle="black";
  programCtx.fillRect(0,0,programCanvas.width,programCanvas.height);
  if(activeProgramVideo){
    programCtx.drawImage(activeProgramVideo,0,0,
      programCanvas.width,programCanvas.height);
  }
  requestAnimationFrame(renderProgram);
}
renderProgram();

/* =======================
   RECORD
======================= */
const recordBtn = document.getElementById("recordBtn");
const recordBtnOverlay = document.getElementById("recordBtnOverlay");
const timer = document.getElementById("timer");

function toggleRecord(){
  isRecording=!isRecording;
  recordBtn.classList.toggle("recording",isRecording);
  recordBtnOverlay.classList.toggle("recording",isRecording);
  recordBtn.innerText = recordBtnOverlay.innerText =
    isRecording ? "■ Stop" : "● Record";

  if(isRecording){
    seconds=0;
    timerInt=setInterval(()=>{
      seconds++;
      timer.innerText=
        `${String(seconds/60|0).padStart(2,"0")}:${String(seconds%60).padStart(2,"0")}`;
    },1000);

    Object.values(recorders).forEach(r=>r.start());
    programRecorder=new MediaRecorder(programStream);
    programChunks=[];
    programRecorder.ondataavailable=e=>e.data.size&&programChunks.push(e.data);
    programRecorder.onstop=()=>{
      const blob=new Blob(programChunks,{type:"video/webm"});
      const ts=new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download=`PROGRAM_FINAL_${ts}.webm`;
      a.click();
    };
    programRecorder.start();
  } else {
    clearInterval(timerInt);
    Object.values(recorders).forEach(r=>r.stop());
    programRecorder.stop();
  }
}

recordBtn.onclick = toggleRecord;
recordBtnOverlay.onclick = toggleRecord;
</script>

</body>
</html>
