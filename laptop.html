<!DOCTYPE html>
<html>
<head>
  <title>CourtStream – Director</title>

  <style>
    :root {
      --bg-primary: #0f1115;
      --bg-panel: #161922;
      --border: #262b3d;

      --text-primary: #e6e6eb;
      --text-muted: #9aa0b4;

      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, Ubuntu, Cantarell;
      padding: 16px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
      font-weight: 600;
    }

    #top {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    button {
      background: var(--bg-panel);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    #timer {
      font-weight: 600;
      color: var(--text-primary);
    }

    .recording {
      background: var(--danger) !important;
      border-color: var(--danger);
    }

    #videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .camera-box {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    video {
      width: 100%;
      border-radius: 8px;
      background: black;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 12px;
    }

    #program {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 360px;
      background: var(--bg-panel);
      border: 2px solid var(--danger);
      border-radius: 12px;
      padding: 6px;
      z-index: 10;
    }

    #qrBox {
      background: var(--bg-panel);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>

<body>

<h2>🎬 CourtStream – Director</h2>

<div id="top">
  <button id="recordBtn">▶ Start Recording</button>
  <span id="timer">00:00</span>
  <button id="qrBtn">📱 Scan QR to Connect</button>
  <button onclick="location.href='playback.html'">▶ Playback</button>
</div>

<div id="qrBox">
  <b>Scan QR to join as Camera or Viewer</b><br><br>
  <canvas id="qrCanvas"></canvas>
</div>

<div id="videos"></div>

<div id="program">
  <video id="programVideo" autoplay muted playsinline></video>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
/* =======================
   CORE STATE
======================= */
const socket = io();
const room = "room1";

const peers = {};
const streams = {};
const recorders = {};
const chunks = {};
const cameraNames = {};

let isRecording = false;
let seconds = 0;
let timerInt;

/* =======================
   PROGRAM COMPOSITOR
======================= */
const programCanvas = document.createElement("canvas");
programCanvas.width = 1280;
programCanvas.height = 720;
const programCtx = programCanvas.getContext("2d");

let activeProgramVideo = null;
let programStream = programCanvas.captureStream(30);
let programRecorder = null;
let programChunks = [];

/* =======================
   UI REFS
======================= */
const recordBtn = document.getElementById("recordBtn");
const timer = document.getElementById("timer");
const programVideo = document.getElementById("programVideo");

programVideo.srcObject = programStream;

/* =======================
   QR
======================= */
const qrBtn = document.getElementById("qrBtn");
const qrBox = document.getElementById("qrBox");
const qrCanvas = document.getElementById("qrCanvas");
const cameraURL = `${location.origin}/phone.html?room=${room}`;

qrBtn.onclick = () => {
  qrBox.style.display = qrBox.style.display === "none" ? "block" : "none";
  QRCode.toCanvas(qrCanvas, cameraURL, { width:220, margin:1 });
};

/* =======================
   SOCKET SETUP
======================= */
socket.emit("join", room);

socket.on("existing-peers", list => list.forEach(p => createPeer(p.id)));
socket.on("peer-joined", p => createPeer(p.id));

async function createPeer(id){
  if (peers[id]) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peers[id] = pc;
  pc.addTransceiver("video",{direction:"recvonly"});
  pc.ontrack = e => addCamera(id, e.streams[0]);
  pc.onicecandidate = e =>
    e.candidate && socket.emit("signal",{to:id,data:e.candidate});

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("signal",{to:id,data:offer});
}

socket.on("signal", async ({from,data})=>{
  const pc = peers[from];
  if (!pc) return;
  if (data.type==="answer") await pc.setRemoteDescription(data);
  if (data.candidate) await pc.addIceCandidate(data);
});

/* =======================
   CAMERA UI
======================= */
function addCamera(id, stream){
  if (document.getElementById(id)) return;

  streams[id] = stream;
  cameraNames[id] = `Camera_${id.slice(0,4)}`;

  const box = document.createElement("div");
  box.className = "camera-box";
  box.id = id;

  const video = document.createElement("video");
  video.srcObject = stream;
  video.autoplay = true;
  video.muted = true;

  const controls = document.createElement("div");
  controls.className = "controls";

  const nameInput = document.createElement("input");
  nameInput.value = cameraNames[id];
  nameInput.oninput = e => cameraNames[id] = e.target.value;

  const row1 = document.createElement("div");
  row1.className = "row";

  const live = document.createElement("button");
  live.innerText = "GO LIVE";
  live.onclick = ()=>{
    activeProgramVideo = video;
    socket.emit("program",{cameraId:id});
  };
  row1.append(live);

  const row2 = document.createElement("div");
  row2.className = "row";

  [1,1.5,2].forEach(z=>{
    const b=document.createElement("button");
    b.innerText=z+"×";
    b.onclick=()=>socket.emit("control",{to:id,type:"zoom",value:z});
    row2.append(b);
  });

  const reset=document.createElement("button");
  reset.innerText="Reset";
  reset.onclick=()=>socket.emit("control",{to:id,type:"reset"});

  const flip=document.createElement("button");
  flip.innerText="Flip";
  flip.onclick=()=>socket.emit("control",{to:id,type:"flip"});

  row2.append(reset,flip);

  controls.append(nameInput,row1,row2);
  box.append(video,controls);
  document.getElementById("videos").appendChild(box);

  const rec = new MediaRecorder(stream);
  recorders[id] = rec;
  chunks[id] = [];

  rec.ondataavailable = e => e.data.size && chunks[id].push(e.data);

  rec.onstop = ()=>{
    const blob = new Blob(chunks[id],{type:"video/webm"});
    chunks[id]=[];
    const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");

    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`${cameraNames[id]}_${ts}.webm`;
    a.click();
  };
}

/* =======================
   PROGRAM RENDER LOOP
======================= */
function renderProgram(){
  programCtx.fillStyle = "black";
  programCtx.fillRect(0, 0, programCanvas.width, programCanvas.height);

  if (activeProgramVideo && activeProgramVideo.videoWidth) {
    const vw = activeProgramVideo.videoWidth;
    const vh = activeProgramVideo.videoHeight;

    const canvasAR = programCanvas.width / programCanvas.height;
    const videoAR = vw / vh;

    let drawW, drawH, x, y;

    if (videoAR > canvasAR) {
      drawW = programCanvas.width;
      drawH = drawW / videoAR;
      x = 0;
      y = (programCanvas.height - drawH) / 2;
    } else {
      drawH = programCanvas.height;
      drawW = drawH * videoAR;
      y = 0;
      x = (programCanvas.width - drawW) / 2;
    }

    programCtx.drawImage(activeProgramVideo, x, y, drawW, drawH);
  }

  requestAnimationFrame(renderProgram);
}
renderProgram();

/* =======================
   RECORD BUTTON
======================= */
recordBtn.onclick = ()=>{
  isRecording = !isRecording;
  recordBtn.classList.toggle("recording",isRecording);
  recordBtn.innerText = isRecording ? "⏹ Stop Recording" : "▶ Start Recording";

  if (isRecording){
    seconds=0;
    timerInt=setInterval(()=>{
      seconds++;
      timer.innerText =
        `${String(seconds/60|0).padStart(2,"0")}:${String(seconds%60).padStart(2,"0")}`;
    },1000);

    Object.values(recorders).forEach(r=>r.start());

    programRecorder = new MediaRecorder(programStream);
    programChunks = [];

    programRecorder.ondataavailable = e =>
      e.data.size && programChunks.push(e.data);

    programRecorder.onstop = ()=>{
      const blob = new Blob(programChunks,{type:"video/webm"});
      const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");

      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download=`PROGRAM_FINAL_${ts}.webm`;
      a.click();
    };

    programRecorder.start();

  } else {
    clearInterval(timerInt);
    Object.values(recorders).forEach(r=>r.stop());
    programRecorder.stop();
  }
};
</script>

</body>
</html>
