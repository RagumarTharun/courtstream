<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MultiCam Playback Editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0f0f0f;--panel:#1c1c1c;--accent:#ff3b3b;
  --text:#eee;--muted:#999;
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:system-ui,Arial;height:100vh;
  display:flex;flex-direction:column;
}

/* TOP */
#topbar{
  display:flex;gap:10px;padding:8px 12px;
  background:#000;align-items:center;
}
#topbar button{
  background:var(--panel);color:var(--text);
  border:none;padding:6px 12px;border-radius:6px;
}
#sessionInfo{margin-left:auto;color:var(--muted);font-size:13px}

/* MAIN */
#main{flex:1;display:flex;overflow:hidden}

/* FOCUS */
#focusView{
  flex:3;background:black;
  display:flex;align-items:center;justify-content:center;
}
#focusView video{max-width:100%;max-height:100%}

/* THUMBS */
#thumbs{
  flex:1;background:var(--panel);padding:8px;
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:8px;overflow:auto;
}
.thumb{position:relative;cursor:pointer}
.thumb video{width:100%;border-radius:6px}
.thumb.active{outline:3px solid var(--accent)}
.badge{
  position:absolute;top:4px;left:4px;
  background:rgba(0,0,0,.7);padding:2px 6px;
  font-size:12px;border-radius:4px;
}

/* COACH PANEL */
#coachPanel{
  width:280px;background:#111;border-left:1px solid #333;
  display:flex;flex-direction:column;
}
#coachHeader{
  padding:8px;background:#000;
  font-weight:bold;
}
#coachList{
  flex:1;overflow:auto;padding:8px;font-size:13px;
}
.note{margin-bottom:8px}
.note span{color:var(--muted);font-size:11px}

/* BOTTOM */
#bottomBar{background:#000;padding:10px;display:flex;flex-direction:column;gap:6px}
#timeline{width:100%}
#controls{
  display:flex;flex-wrap:wrap;gap:8px;
  justify-content:center;align-items:center;
}
#controls button,#controls select{
  background:var(--panel);color:var(--text);
  border:none;padding:6px 10px;border-radius:6px;
}
#timeDisplay{min-width:130px;text-align:center;font-weight:bold}

/* MARKERS */
#markers{position:relative;height:8px}
.marker{
  position:absolute;top:0;width:6px;height:6px;
  border-radius:50%;cursor:pointer;
}
</style>
</head>

<body>

<div id="topbar">
  <button id="openFiles">📂 Open Recording Files</button>
  <button id="exportClip">✂ Export Clip</button>
  <div id="sessionInfo">No session loaded</div>
</div>

<div id="main">
  <div id="focusView"></div>
  <div id="thumbs"></div>

  <div id="coachPanel">
    <div id="coachHeader">Coach Notes</div>
    <div id="coachList"></div>
  </div>
</div>

<div id="bottomBar">
  <input type="range" id="timeline" min="0" step="0.01" value="0">
  <div id="markers"></div>

  <div id="controls">
    <button id="play">▶</button>
    <button id="back">⏪</button>
    <button id="forward">⏩</button>

    <select id="speed">
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2×</option>
    </select>

    <button id="markGood">✅</button>
    <button id="markBad">❌</button>
    <button id="markNote">🧠</button>

    <button id="setIn">I</button>
    <button id="setOut">O</button>

    <span id="timeDisplay">00:00 / 00:00</span>
  </div>
</div>

<input type="file" id="picker" multiple accept="video/webm" hidden>

<script>
/* ===== FIXED BINDINGS ===== */
const openFilesBtn = document.getElementById("openFiles");
const picker = document.getElementById("picker");

/* STATE */
let videos=[],master=null,duration=0,focused=0;
let playing=false,inPoint=null,outPoint=null;

openFilesBtn.onclick = () => picker.click();

/* FILE LOAD */
picker.onchange = e=>{
  videos=[];thumbs.innerHTML="";focusView.innerHTML="";
  coachList.innerHTML="";markers.innerHTML="";
  inPoint=outPoint=null;

  const files=[...e.target.files];
  if(!files.length)return;
  sessionInfo.innerText=`${files.length} cameras loaded`;

  files.forEach((f,i)=>{
    const v=document.createElement("video");
    v.src=URL.createObjectURL(f);v.muted=true;
    videos.push(v);

    const t=document.createElement("div");
    t.className="thumb";t.onclick=()=>focus(i);
    const b=document.createElement("div");
    b.className="badge";b.innerText=`Cam ${i+1}`;
    t.append(v,b);thumbs.appendChild(t);
  });

  master=videos[0];
  master.onloadedmetadata=()=>{
    duration=master.duration||0;
    timeline.max=duration;timeline.value=0;
    updateTime(0);focus(0);
  };
  master.ontimeupdate=sync;
};

/* SYNC */
function sync(){
  const t=Math.min(master.currentTime,duration);
  videos.forEach(v=>Math.abs(v.currentTime-t)>0.1&&(v.currentTime=t));
  timeline.value=t;updateTime(t);
}

/* TIME */
function fmt(t){
  if(!isFinite(t))return"00:00";
  const m=Math.floor(t/60).toString().padStart(2,"0");
  const s=Math.floor(t%60).toString().padStart(2,"0");
  return`${m}:${s}`;
}
function updateTime(t){
  timeDisplay.innerText=`${fmt(t)} / ${fmt(duration)}`;
}

/* FOCUS */
function focus(i){
  focused=i;focusView.innerHTML="";
  focusView.appendChild(videos[i]);
  [...thumbs.children].forEach((e,idx)=>e.classList.toggle("active",idx===i));
}

/* PLAYBACK */
play.onclick=()=>{
  playing=!playing;
  videos.forEach(v=>playing?v.play():v.pause());
};
back.onclick=()=>seek(-5);
forward.onclick=()=>seek(5);
function seek(d){
  master.currentTime=Math.max(0,Math.min(duration,master.currentTime+d));
}
speed.onchange=e=>videos.forEach(v=>v.playbackRate=+e.target.value);
timeline.oninput=e=>master.currentTime=+e.target.value;

/* MARKERS + PAUSE */
function pauseAndMark(color,label){
  videos.forEach(v=>v.pause());playing=false;
  const t=master.currentTime;

  const m=document.createElement("div");
  m.className="marker";
  m.style.left=(t/duration*100)+"%";
  m.style.background=color;
  m.onclick=()=>master.currentTime=t;
  markers.appendChild(m);

  const n=document.createElement("div");
  n.className="note";
  n.innerHTML=`<strong>${label}</strong><br><span>${fmt(t)}</span>`;
  coachList.appendChild(n);
}

markGood.onclick=()=>pauseAndMark("lime","Good play");
markBad.onclick=()=>pauseAndMark("red","Mistake");
markNote.onclick=()=>{
  videos.forEach(v=>v.pause());playing=false;
  const txt=prompt("Coach note:");
  if(txt)pauseAndMark("cyan",txt);
};

/* IN / OUT */
setIn.onclick=()=>{
  inPoint=master.currentTime;
  coachList.innerHTML+=`<div class="note"><strong>🎬 Clip IN</strong><br><span>${fmt(inPoint)}</span></div>`;
};
setOut.onclick=()=>{
  outPoint=master.currentTime;
  coachList.innerHTML+=`<div class="note"><strong>🎬 Clip OUT</strong><br><span>${fmt(outPoint)}</span></div>`;
};

/* EXPORT */
exportClip.onclick=()=>{
  if(inPoint==null||outPoint==null||outPoint<=inPoint){
    alert("Set valid IN and OUT");return;
  }
  videos.forEach(v=>v.pause());
  const stream=videos[focused].captureStream();
  const rec=new MediaRecorder(stream);
  const chunks=[];
  rec.ondataavailable=e=>chunks.push(e.data);
  rec.onstop=()=>{
    const blob=new Blob(chunks,{type:"video/webm"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`clip_cam${focused+1}_${fmt(inPoint)}_to_${fmt(outPoint)}.webm`;
    a.click();
  };
  videos[focused].currentTime=inPoint;
  rec.start();videos[focused].play();
  setTimeout(()=>{rec.stop();videos[focused].pause()},(outPoint-inPoint)*1000);
};

/* KEYBOARD */
document.addEventListener("keydown",e=>{
  if(e.key===" ") {e.preventDefault();play.click();}
  if(e.key==="ArrowLeft")seek(e.shiftKey?-5:-1);
  if(e.key==="ArrowRight")seek(e.shiftKey?5:1);
  if(e.key>="1"&&e.key<="9")focus(+e.key-1);
  if(e.key==="g")pauseAndMark("lime","Good play");
  if(e.key==="b")pauseAndMark("red","Mistake");
  if(e.key==="n")markNote.click();
  if(e.key==="i")setIn.click();
  if(e.key==="o")setOut.click();
  if(e.key==="e")exportClip.click();
});
</script>

</body>
</html>
