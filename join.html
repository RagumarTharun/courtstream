<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Join CourtStream</title>
<style>
body{margin:0;background:#0f1115;color:#e6e6eb;font-family:system-ui}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:360px;background:#161922;border:1px solid #262b3d;border-radius:16px;padding:28px}
button{width:100%;margin-top:14px;padding:10px;border-radius:999px;border:none;background:#3b82f6;color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h3>Join as</h3>
    <button onclick="go('camera')">Camera</button>
    <button onclick="go('viewer')">Viewer</button>
  </div>
</div>

<script>
const s=new URLSearchParams(location.search).get("stream");
function go(role){
  location.href = role==="camera"
    ? `camera-join.html?stream=${s}`
    : `viewer.html?stream=${s}`;
}
</script>
</body>
</html>
