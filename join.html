<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Join</title>
<style>
body{margin:0;background:#0f1115;color:#e6e6eb;font-family:system-ui}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:380px;background:#161922;border:1px solid #262b3d;border-radius:16px;padding:28px}
select,input{width:100%;margin-top:12px;padding:10px;border-radius:10px;background:#0f1115;border:1px solid #262b3d;color:#e6e6eb}
button{margin-top:20px;width:100%;padding:10px;border-radius:999px;border:none;background:#3b82f6;color:#fff}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <h2>Join CourtStream</h2>
    <input id="passcode" placeholder="Passcode (if required)">
    <select id="role">
      <option value="viewer">Viewer</option>
      <option value="camera">Camera</option>
    </select>
    <button onclick="proceed()">Continue</button>
  </div>
</div>

<script>
const params=new URLSearchParams(location.search);
const stream=params.get('stream');
function proceed(){
  if(role.value==='camera')
    location.href=`camera-join.html?stream=${stream}`;
  else
    location.href=`viewer.html?stream=${stream}`;
}
</script>
</body>
</html>
