<!DOCTYPE html>
<html>
<head>
  <title>Create CourtStream</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body class="center">

<form class="card">
  <h2>Create CourtStream</h2>

  <label>Name</label>
  <input id="name" placeholder="Court / Match name">

  <label>Resolution</label>
  <select id="res">
    <option value="1280x720">720p</option>
    <option value="1920x1080">1080p</option>
  </select>

  <label>Max Cameras</label>
  <select id="max">
    <option>3</option>
    <option>4</option>
    <option>6</option>
  </select>

  <button class="primary" type="button" onclick="create()">
    Create & Go Live
  </button>
</form>

<script>
async function create(){
  const id = crypto.randomUUID();
  await fetch("/api/create", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      id,
      name:name.value,
      resolution:res.value,
      maxCameras:max.value
    })
  });
  location.href = `director.html?room=${id}`;
}
</script>
</body>
</html>
