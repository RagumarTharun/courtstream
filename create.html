<!DOCTYPE html>
<html>
<head>
  <title>Create CourtStream</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body style="padding:40px;max-width:600px;margin:auto">

<h2>Create CourtStream</h2>

<label>Stream Name</label>
<input placeholder="Court / Match name">

<br><br>
<label>Maximum Cameras</label>
<select>
  <option>3</option>
  <option>4</option>
  <option>6</option>
</select>

<br><br>
<label>Viewer Access</label>
<select>
  <option>Anyone</option>
  <option>Passcode</option>
</select>

<br><br>
<label>Camera Join Passcode</label>
<input placeholder="Optional">

<br><br>
<label>Recording Resolution</label>
<select>
  <option>720p</option>
  <option>1080p</option>
</select>

<br><br>
<button class="primary" onclick="location.href='director.html'">
  Create & Go Live
</button>

</body>
</html>
