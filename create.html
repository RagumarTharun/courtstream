<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create CourtStream</title>
  <style>
    body {
      margin: 0;
      background: #0f1115;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #e6e6eb;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 440px;
      background: #161922;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 0 0 1px #262b3d;
    }

    h2 {
      margin: 0 0 20px;
      font-size: 20px;
    }

    label {
      font-size: 13px;
      color: #9aa0b4;
      display: block;
      margin-top: 14px;
    }

    input, select {
      width: 100%;
      margin-top: 6px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #0f1115;
      border: 1px solid #262b3d;
      color: #e6e6eb;
      outline: none;
    }

    input::placeholder {
      color: #6b7280;
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row > div {
      flex: 1;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    button {
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
    }

    .secondary {
      background: transparent;
      border: 1px solid #262b3d;
      color: #e6e6eb;
    }

    .primary {
      background: #3b82f6;
      border: none;
      color: #fff;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card">
    <h2>Create CourtStream</h2>

    <label>Stream name</label>
    <input placeholder="JBA Court – Evening Practice" />

    <div class="row">
      <div>
        <label>Max cameras</label>
        <select>
          <option>3</option>
          <option>4</option>
          <option>6</option>
        </select>
      </div>

      <div>
        <label>Recording resolution</label>
        <select>
          <option>720p</option>
          <option>1080p</option>
        </select>
      </div>
    </div>

    <label>Who can join as camera</label>
    <select id="cameraAccess">
      <option value="open">Anyone</option>
      <option value="locked">Passcode required</option>
    </select>

    <div id="cameraPasscode" class="hidden">
      <label>Camera passcode</label>
      <input type="password" placeholder="Strong camera passcode" />
      <div class="hint">Use at least 8 characters with letters and numbers</div>
    </div>

    <label>Who can view</label>
    <select id="viewerAccess">
      <option value="open">Anyone</option>
      <option value="locked">Passcode required</option>
    </select>

    <div id="viewerPasscode" class="hidden">
      <label>Viewer passcode</label>
      <input type="password" placeholder="Strong viewer passcode" />
      <div class="hint">Share only with trusted viewers</div>
    </div>

    <div class="actions">
      <button class="secondary">Cancel</button>
      <button class="primary">Create Stream</button>
    </div>
  </div>
</div>

<script>
  const cameraAccess = document.getElementById("cameraAccess");
  const viewerAccess = document.getElementById("viewerAccess");
  const cameraPasscode = document.getElementById("cameraPasscode");
  const viewerPasscode = document.getElementById("viewerPasscode");

  cameraAccess.onchange = () => {
    cameraPasscode.classList.toggle("hidden", cameraAccess.value !== "locked");
  };

  viewerAccess.onchange = () => {
    viewerPasscode.classList.toggle("hidden", viewerAccess.value !== "locked");
  };
</script>

</body>
</html>
