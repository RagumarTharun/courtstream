<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Stream – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #0f1115;
    color: #e6e6eb;
    font-family: system-ui, Arial;
  }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 420px;
    background: #161922;
    border: 1px solid #262b3d;
    border-radius: 16px;
    padding: 28px;
  }

  h2 {
    margin-top: 0;
    margin-bottom: 6px;
  }

  .muted {
    color: #9aa0b4;
    font-size: 14px;
    margin-bottom: 18px;
  }

  label {
    font-size: 13px;
    color: #9aa0b4;
    display: block;
    margin-top: 14px;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    background: #0f1115;
    border: 1px solid #262b3d;
    color: #e6e6eb;
    font-size: 14px;
  }

  button {
    width: 100%;
    margin-top: 22px;
    padding: 10px;
    border-radius: 999px;
    border: none;
    background: #ff3b3b;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .error {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
  }

  .top-link {
    text-align: right;
    margin-bottom: 8px;
  }

  .top-link a {
    color: #9aa0b4;
    font-size: 13px;
    text-decoration: none;
  }
</style>
</head>

<body>

<div class="page">
  <div class="card">

    <div class="top-link">
      <a href="index.html">← Home</a>
    </div>

    <h2 id="greeting">Create Stream</h2>
    <div class="muted">You will be the director of this stream.</div>

    <label>Stream name</label>
    <input id="nameInput" placeholder="e.g. JBA_U16_Final">

    <label>Max cameras</label>
    <input id="maxCameras" type="number" min="1" max="12" value="6">

    <label>Resolution</label>
    <select id="resolution">
      <option value="720p">720p (recommended)</option>
      <option value="1080p">1080p</option>
    </select>

    <label>Camera access</label>
    <select id="cameraAccess">
      <option value="open">Open</option>
      <option value="protected">Password protected</option>
    </select>

    <label>Viewer access</label>
    <select id="viewerAccess">
      <option value="public">Public</option>
      <option value="protected">Password protected</option>
    </select>

    <button id="createBtn">Create Stream</button>
    <div class="error" id="error"></div>

  </div>
</div>

<script>
/* ======================
   ELEMENT REFERENCES
====================== */
const nameInput = document.getElementById("nameInput");
const createBtn = document.getElementById("createBtn");
const errorBox = document.getElementById("error");

/* ======================
   AUTH CHECK
====================== */
(async () => {
  const res = await fetch("/me", { credentials: "include" });
  if (!res.ok) {
    location.href = "login.html";
    return;
  }
  const user = await res.json();
  document.getElementById("greeting").innerText =
    `Hello ${user.email}`;
})();

/* ======================
   CREATE STREAM
====================== */
createBtn.addEventListener("click", async () => {
  errorBox.innerText = "";
  createBtn.disabled = true;

  const name = nameInput.value.trim();

  if (!name || name.length < 3) {
    errorBox.innerText = "Stream name must be at least 3 characters.";
    createBtn.disabled = false;
    return;
  }

  const res = await fetch("/api/streams", {
    method: "POST",
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name })
  });

  createBtn.disabled = false;

  if (!res.ok) {
    errorBox.innerText = "Stream name already exists.";
    return;
  }

  location.href = "index.html";
});
</script>

</body>
</html>
