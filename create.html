<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create CourtStream</title>
<style>
body{margin:0;background:#0f1115;color:#e6e6eb;font-family:system-ui}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:440px;background:#161922;border:1px solid #262b3d;border-radius:16px;padding:28px}
input,select,button{width:100%;margin-top:12px;padding:10px;border-radius:10px;background:#0f1115;border:1px solid #262b3d;color:#e6e6eb}
.primary{background:#3b82f6;border:none;border-radius:999px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h2>Create CourtStream</h2>
    <input id="name" placeholder="Stream name">
    <select id="resolution">
      <option>720p</option>
      <option>1080p</option>
    </select>
    <button class="primary" onclick="create()">Create</button>
  </div>
</div>

<script>
async function create(){
  const res = await fetch("/api/streams",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ name:name.value })
  });
  if(res.status===401) return alert("Login required");
  if(res.status===409) return alert("Stream name already exists");
  const data = await res.json();
  location.href = `director.html?stream=${data.id}`;
}
</script>
</body>
</html>
