<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Create Stream – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="theme.css" />

<style>
  body {
    background: #0f1115;
    color: #eee;
    font-family: system-ui, Arial;
    margin: 0;
  }

  .container {
    max-width: 560px;
    margin: 60px auto;
    padding: 24px;
  }

  h1 { margin-bottom: 6px; }
  .muted { color:#aaa; margin-bottom:20px; }

  label {
    font-size: 14px;
    color: #aaa;
    display: block;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    margin-bottom: 16px;
  }

  button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #ff3b3b;
    color: white;
    cursor: pointer;
    font-size: 16px;
  }

  button:disabled { opacity:0.6; }

  .row {
    display: flex;
    gap: 12px;
  }

  .error {
    color:#ff6b6b;
    margin-top: 12px;
  }

  .top {
    display:flex;
    justify-content:space-between;
    margin-bottom:24px;
  }

  .link {
    color:#aaa;
    cursor:pointer;
    font-size:14px;
  }
</style>
</head>

<body>

<div class="container">

  <div class="top">
    <strong>Create Stream</strong>
    <span class="link" onclick="location.href='/'">← Home</span>
  </div>

  <h1 id="greeting">Create a new stream</h1>
  <div class="muted">You will be the director of this stream.</div>

  <label>Stream name</label>
  <input id="name" placeholder="e.g. JBA_U16_Final" />

  <div class="row">
    <div style="flex:1">
      <label>Max cameras</label>
      <input id="maxCameras" type="number" min="1" max="12" value="6" />
    </div>

    <div style="flex:1">
      <label>Resolution</label>
      <select id="resolution">
        <option value="720p">720p (recommended)</option>
        <option value="1080p">1080p</option>
      </select>
    </div>
  </div>

  <label>Camera access</label>
  <select id="cameraAccess">
    <option value="open">Open</option>
    <option value="protected">Password protected</option>
  </select>

  <input
    id="cameraPass"
    placeholder="Camera password (optional)"
    style="display:none"
  />

  <label>Viewer access</label>
  <select id="viewerAccess">
    <option value="public">Public</option>
    <option value="protected">Password protected</option>
  </select>

  <input
    id="viewerPass"
    placeholder="Viewer password (optional)"
    style="display:none"
  />

  <button id="createBtn">Create Stream</button>
  <div class="error" id="error"></div>

</div>

<script>
/* AUTH */
(async () => {
  const res = await fetch("/me");
  if (!res.ok) location.href = "/login.html";
  const user = await res.json();
  document.getElementById("greeting").innerText = `Hello ${user.email}`;
})();

/* TOGGLES */
const cameraAccess = document.getElementById("cameraAccess");
const viewerAccess = document.getElementById("viewerAccess");

cameraAccess.onchange = () =>
  document.getElementById("cameraPass").style.display =
    cameraAccess.value === "protected" ? "block" : "none";

viewerAccess.onchange = () =>
  document.getElementById("viewerPass").style.display =
    viewerAccess.value === "protected" ? "block" : "none";

/* CREATE */
document.getElementById("createBtn").onclick = async () => {
  const payload = {
    name: name.value.trim(),
    max_cameras: Number(maxCameras.value),
    resolution: resolution.value,
    camera_access: cameraAccess.value,
    camera_pass: cameraPass.value.trim(),
    viewer_access: viewerAccess.value,
    viewer_pass: viewerPass.value.trim()
  };

  if (!payload.name || payload.name.length < 3) {
    error.innerText = "Stream name too short.";
    return;
  }

  const res = await fetch("/create-stream", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(payload)
  });

  const data = await res.json();
  if (!res.ok) {
    error.innerText = data.error || "Failed to create stream.";
    return;
  }

  location.href = `/director.html?stream=${encodeURIComponent(payload.name)}`;
};
</script>

</body>
</html>
