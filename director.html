<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#0f1115;
  --panel:#161922;
  --border:#262b3d;
  --text:#e6e6eb;
  --muted:#9aa0b4;
  --blue:#3b82f6;
  --red:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  height:100vh;
}

.director{
  display:flex;
  flex-direction:column;
  gap:14px;
  padding:14px;
  height:100%;
}

/* ===== MAIN PREVIEW (FIXED SIZE) ===== */

.preview-wrapper{
  position:relative;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  height:55vh;              /* 🔑 fixed height */
  max-height:520px;
  min-height:360px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.preview-wrapper video{
  width:100%;
  height:100%;
  object-fit:contain;
  border-radius:16px;
  background:#000;
}

/* Instruction overlay */
#previewHint{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:14px;
  pointer-events:none;
}

/* ===== TOP BAR ===== */

.top-bar{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
}

.stream-info{
  pointer-events:auto;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
}

/* ===== RECORD BAR (VISUAL ONLY) ===== */

.record-bar{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  align-items:center;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
}
.record-dot{
  width:12px;
  height:12px;
  background:var(--red);
  border-radius:50%;
}
.timer{font-size:13px}

/* ===== CAMERA STRIP (BELOW PREVIEW) ===== */

.camera-strip{
  display:flex;
  gap:12px;
  height:120px;
}

.camera-tile{
  flex:1;
  background:#000;
  border-radius:14px;
  overflow:hidden;
  border:2px solid transparent;
  cursor:pointer;
  position:relative;
}

.camera-tile.active{
  border-color:var(--blue);
}

.camera-tile video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.camera-label{
  position:absolute;
  bottom:6px;
  left:6px;
  background:rgba(0,0,0,.6);
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="director">

  <!-- MAIN PREVIEW -->
  <div class="preview-wrapper">
    <video id="mainVideo" autoplay muted playsinline></video>

    <div id="previewHint">
      Select a camera below to preview
    </div>

    <div class="top-bar">
      <div class="stream-info" id="streamTitle">LIVE</div>
    </div>

    <div class="record-bar">
      <div class="record-dot"></div>
      <div class="timer">00:00:00</div>
    </div>
  </div>

  <!-- CAMERA STRIP -->
  <div class="camera-strip" id="strip"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const socket = io();

const peers = {};
const mainVideo = document.getElementById("mainVideo");
const strip = document.getElementById("strip");
const previewHint = document.getElementById("previewHint");

/* Stream name */
fetch("/api/streams")
  .then(r=>r.json())
  .then(list=>{
    const s=list.find(x=>x.id===streamId);
    if(s) document.getElementById("streamTitle").innerText =
      `${s.name} • LIVE`;
  });

/* JOIN */
socket.emit("join", streamId);

/* EXISTING */
socket.on("existing-peers", list=>{
  list.forEach(p=>createPeer(p.id));
});

/* NEW CAMERA */
socket.on("peer-joined", p=>{
  createPeer(p.id);
});

function createPeer(id){
  if(peers[id]) return;

  const pc=new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peers[id]={pc};

  pc.addTransceiver("video",{direction:"recvonly"});

  pc.ontrack=e=>{
    if(peers[id].stream) return;
    peers[id].stream=e.streams[0];

    const tile=document.createElement("div");
    tile.className="camera-tile";

    const v=document.createElement("video");
    v.autoplay=true;
    v.muted=true;
    v.playsInline=true;
    v.srcObject=peers[id].stream;

    const label=document.createElement("div");
    label.className="camera-label";
    label.innerText="Camera";

    tile.appendChild(v);
    tile.appendChild(label);
    strip.appendChild(tile);

    peers[id].tile=tile;

    tile.onclick=()=>setMain(id);
  };

  pc.onicecandidate=e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,data:e.candidate});
    }
  };

  pc.createOffer()
    .then(o=>pc.setLocalDescription(o))
    .then(()=>socket.emit("signal",{to:id,data:pc.localDescription}));
}

function setMain(id){
  const peer=peers[id];
  if(!peer||!peer.stream) return;

  mainVideo.srcObject=peer.stream;
  previewHint.style.display="none";

  document.querySelectorAll(".camera-tile")
    .forEach(t=>t.classList.remove("active"));

  peer.tile.classList.add("active");
}

/* SIGNAL */
socket.on("signal",async({from,data})=>{
  const peer=peers[from];
  if(!peer) return;

  if(data.type==="answer"){
    await peer.pc.setRemoteDescription(data);
  }
  if(data.candidate){
    await peer.pc.addIceCandidate(data);
  }
});

/* LEAVE */
socket.on("camera-left",({id})=>{
  const peer=peers[id];
  if(!peer) return;

  peer.pc.close();
  peer.tile?.remove();
  delete peers[id];

  if(mainVideo.srcObject===peer.stream){
    mainVideo.srcObject=null;
    previewHint.style.display="flex";
  }
});
</script>

</body>
</html>
