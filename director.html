<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#0f1115;
  --panel:#161922;
  --border:#262b3d;
  --text:#e6e6eb;
  --muted:#9aa0b4;
  --blue:#3b82f6;
  --red:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  height:100vh;
}

/* ===== LAYOUT ===== */

.director{
  display:grid;
  grid-template-columns:220px 1fr 220px;
  grid-template-rows:auto 140px;
  gap:14px;
  padding:14px;
  height:100%;
}

/* ===== PREVIEW ===== */

.preview{
  grid-column:2;
  position:relative;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  height:520px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.preview video{
  width:100%;
  height:100%;
  object-fit:contain;
  border-radius:16px;
  background:#000;
}

.preview-hint{
  position:absolute;
  color:var(--muted);
  font-size:14px;
  pointer-events:none;
}

/* ===== TOP BAR ===== */

.top-bar{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  display:flex;
  justify-content:space-between;
}

.stream-name{
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
}

/* ===== RECORD ===== */

.record-bar{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  align-items:center;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
}

.record-dot{
  width:12px;
  height:12px;
  background:var(--red);
  border-radius:50%;
}

/* ===== CAMERA STRIPS ===== */

.strip{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.strip.bottom{
  grid-column:2;
  grid-row:2;
  flex-direction:row;
}

.camera-box{
  background:#000;
  border:1px solid var(--border);
  border-radius:14px;
  height:140px;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.camera-box video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.placeholder{
  color:var(--muted);
  font-size:12px;
}

.label{
  position:absolute;
  bottom:6px;
  left:6px;
  background:rgba(0,0,0,.6);
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="director">

  <!-- LEFT STRIP -->
  <div class="strip">
    <div class="camera-box"><span class="placeholder">Waiting for camera</span></div>
    <div class="camera-box"><span class="placeholder">Waiting for camera</span></div>
    <div class="camera-box"><span class="placeholder">Waiting for camera</span></div>
  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <video id="mainVideo" autoplay muted playsinline></video>
    <div class="preview-hint">Select a camera to preview</div>

    <div class="top-bar">
      <div class="stream-name" id="streamTitle">CourtStream • LIVE</div>
    </div>

    <div class="record-bar">
      <div class="record-dot"></div>
      <div>00:00:00</div>
    </div>
  </div>

  <!-- RIGHT STRIP -->
  <div class="strip">
    <div class="camera-box"><span class="placeholder">Bench A</span></div>
    <div class="camera-box"><span class="placeholder">Bench B</span></div>
    <div class="camera-box"><span class="placeholder">Moving</span></div>
  </div>

  <!-- BOTTOM STRIP -->
  <div class="strip bottom">
    <div class="camera-box"><span class="placeholder">Waiting for camera</span></div>
    <div class="camera-box"><span class="placeholder">Waiting for camera</span></div>
    <div class="camera-box"><span class="placeholder">Waiting for camera</span></div>
  </div>

</div>

</body>
</html>
