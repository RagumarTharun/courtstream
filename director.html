<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* (UNCHANGED UI – your exact styles) */
:root{
  --bg:#0f1115;
  --panel:#161922;
  --border:#262b3d;
  --text:#e6e6eb;
  --muted:#9aa0b4;
  --red:#ef4444;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  height:100vh;
}
.director{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:14px;
  padding:14px;
  height:100%;
}
.panel{
  background:var(--panel);
  border-radius:16px;
  border:1px solid var(--border);
}
.main-feed{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  overflow:hidden;
}
.main-feed::before{
  content:"";
  display:block;
  padding-top:56.25%;
}
.main-feed video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
}
.placeholder{
  position:absolute;
  color:var(--muted);
}
.stream-badge{
  position:absolute;
  top:14px;
  left:14px;
  background:rgba(15,17,21,.85);
  padding:6px 12px;
  border-radius:999px;
}
.side-panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:12px;
  overflow-y:auto;
}
.camera-slot{
  height:140px;
  background:#000;
  border-radius:14px;
  border:1px solid var(--border);
  overflow:hidden;
  cursor:pointer;
}
.camera-slot video{
  width:100%;
  height:100%;
  object-fit:contain;
}
.camera-slot span{
  position:absolute;
  bottom:8px;
  left:8px;
  font-size:12px;
  background:rgba(0,0,0,.6);
  padding:4px 8px;
  border-radius:999px;
}
</style>
</head>

<body>

<div class="director">

  <div class="panel main-feed">
    <video id="mainVideo" autoplay muted playsinline></video>
    <div id="placeholder" class="placeholder">Select a camera to preview</div>
    <div class="stream-badge">LIVE</div>
  </div>

  <div class="panel side-panel" id="cameraStrip"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");

const socket = io();
const mainVideo = document.getElementById("mainVideo");
const placeholder = document.getElementById("placeholder");
const strip = document.getElementById("cameraStrip");

const peers = {}; // socketId -> { pc, stream, slot }

/* JOIN */
socket.emit("join", streamId);

/* 🔑 ACCEPT PEERS EVEN IF peer-joined NEVER FIRED */
socket.on("signal", async ({ from, data }) => {

  // Create peer lazily if missing
  if (!peers[from]) {
    createPeer(from);
  }

  const peer = peers[from];

  if (data.type) {
    await peer.pc.setRemoteDescription(data);
  }

  if (data.candidate) {
    await peer.pc.addIceCandidate(data);
  }
});

/* Still handle normal joins */
socket.on("peer-joined", ({ id }) => {
  if (!peers[id]) createPeer(id);
});

socket.on("peer-left", ({ id }) => {
  const p = peers[id];
  if (!p) return;
  p.pc.close();
  p.slot.remove();
  delete peers[id];
  if (mainVideo.srcObject === p.stream) {
    mainVideo.srcObject = null;
    placeholder.style.display = "block";
  }
});

function createPeer(id){
  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.addTransceiver("video", { direction:"recvonly" });

  const slot = document.createElement("div");
  slot.className = "camera-slot";
  slot.innerHTML = "<span>Camera</span>";
  strip.appendChild(slot);

  peers[id] = { pc, slot };

  pc.ontrack = e => {
    if (peers[id].stream) return;

    const stream = e.streams[0];
    peers[id].stream = stream;

    const v = document.createElement("video");
    v.autoplay = true;
    v.muted = true;
    v.playsInline = true;
    v.srcObject = stream;

    slot.prepend(v);

    slot.onclick = () => {
      mainVideo.srcObject = stream;
      placeholder.style.display = "none";
    };
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal", { to:id, data:e.candidate });
    }
  };
}
</script>

</body>
</html>
