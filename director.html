<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#0f1115;
  --panel:#161922;
  --border:#262b3d;
  --text:#e6e6eb;
  --muted:#9aa0b4;
  --blue:#3b82f6;
  --red:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  height:100vh;
}

/* ===== LAYOUT ===== */
.director{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:14px;
  padding:14px;
  height:100%;
}

/* ===== PANELS ===== */
.panel{
  background:var(--panel);
  border-radius:16px;
  border:1px solid var(--border);
}

/* ===== MAIN PREVIEW ===== */
.main-feed{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}

.main-feed video{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:16px;
}

/* Placeholder */
.placeholder{
  position:absolute;
  color:var(--muted);
  font-size:14px;
}

/* Top label */
.stream-badge{
  position:absolute;
  top:14px;
  left:14px;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
}

/* Record badge (visual only) */
.record-bar{
  position:absolute;
  bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
}
.record-dot{
  width:10px;
  height:10px;
  background:var(--red);
  border-radius:50%;
}

/* ===== RIGHT CAMERA STRIPE ===== */
.side-panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:12px;
}

.side-title{
  font-size:13px;
  color:var(--muted);
}

.camera-slot{
  flex:1;
  background:#000;
  border-radius:14px;
  border:1px solid var(--border);
  position:relative;
  overflow:hidden;
  cursor:pointer;
}

.camera-slot video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.camera-slot span{
  position:absolute;
  bottom:8px;
  left:8px;
  font-size:12px;
  background:rgba(0,0,0,.6);
  padding:4px 8px;
  border-radius:999px;
  color:#fff;
}
</style>
</head>

<body>

<div class="director">

  <!-- MAIN PREVIEW -->
  <div class="panel main-feed">
    <video id="mainVideo" autoplay muted playsinline></video>
    <div id="placeholder" class="placeholder">Select a camera to preview</div>

    <div class="stream-badge" id="streamName">CourtStream • LIVE</div>

    <div class="record-bar">
      <div class="record-dot"></div>
      <div>00:00:00</div>
    </div>
  </div>

  <!-- RIGHT CAMERA STRIPE -->
  <div class="panel side-panel">
    <div class="side-title">Cameras</div>

    <div class="camera-slot" data-slot>
      <span>Waiting for camera</span>
    </div>

    <div class="camera-slot" data-slot>
      <span>Waiting for camera</span>
    </div>

    <div class="camera-slot" data-slot>
      <span>Waiting for camera</span>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const socket = io();

document.getElementById("streamName").innerText = streamId + " • LIVE";

const mainVideo = document.getElementById("mainVideo");
const placeholder = document.getElementById("placeholder");
const slots = [...document.querySelectorAll("[data-slot]")];

const peers = {}; // id -> { pc, stream }

/* JOIN */
socket.emit("join", streamId);

/* NEW CAMERA */
socket.on("peer-joined", ({ id }) => {
  if (Object.keys(peers).length >= slots.length) return;
  createPeer(id);
});

/* CREATE PEER */
function createPeer(id){
  if (peers[id]) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peers[id] = { pc };

  pc.addTransceiver("video", { direction:"recvonly" });

  pc.ontrack = e => {
    const stream = e.streams[0];
    peers[id].stream = stream;

    const slot = slots.find(s => !s.querySelector("video"));
    if (!slot) return;

    slot.innerHTML = "";
    const v = document.createElement("video");
    v.autoplay = true;
    v.muted = true;
    v.playsInline = true;
    v.srcObject = stream;

    v.onloadedmetadata = () => {
      v.play().catch(()=>{});
    };

    slot.appendChild(v);
    slot.appendChild(Object.assign(document.createElement("span"),{
      innerText:"Camera"
    }));

    slot.onclick = () => {
      mainVideo.srcObject = stream;
      placeholder.style.display = "none";
      mainVideo.onloadedmetadata = () => {
        mainVideo.play().catch(()=>{});
      };
    };
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal",{ to:id, data:e.candidate });
    }
  };

  pc.createOffer()
    .then(o => pc.setLocalDescription(o))
    .then(() => {
      socket.emit("signal",{ to:id, data:pc.localDescription });
    });
}

/* SIGNAL */
socket.on("signal", async ({ from, data }) => {
  const peer = peers[from];
  if (!peer) return;

  if (data.type) {
    await peer.pc.setRemoteDescription(data);
  }
  if (data.candidate) {
    await peer.pc.addIceCandidate(data);
  }
});
</script>

</body>
</html>
