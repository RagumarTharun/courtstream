<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Director</title>
<style>
body{margin:0;background:#0f1115;color:#e6e6eb;font-family:system-ui}
video{width:100vw;height:100vh;object-fit:contain;background:#000}
</style>
</head>
<body>
<video id="main" autoplay muted playsinline></video>

<script src="/socket.io/socket.io.js"></script>
<script>
const s=new URLSearchParams(location.search).get("stream");
const socket=io();
const pc=new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});
socket.emit("join",{room:s,role:"director"});

pc.ontrack=e=>main.srcObject=e.streams[0];
pc.onicecandidate=e=>e.candidate&&socket.emit("signal",{data:{candidate:e.candidate}});

socket.on("peer-joined",async({id})=>{
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("signal",{to:id,data:{sdp:offer}});
});
socket.on("signal",async({from,data})=>{
  if(data.sdp) await pc.setRemoteDescription(data.sdp);
  if(data.candidate) await pc.addIceCandidate(data.candidate);
});
</script>
</body>
</html>
