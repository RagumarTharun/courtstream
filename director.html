<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#0f1115;
  --panel:#161922;
  --border:#262b3d;
  --text:#e6e6eb;
  --muted:#9aa0b4;
  --blue:#3b82f6;
  --red:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  height:100vh;
}

.director{
  display:grid;
  grid-template-columns:1fr 260px;
  gap:14px;
  padding:14px;
  height:100%;
}

/* ===== PREVIEW ===== */

.preview{
  position:relative;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  height:540px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.preview video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
  border-radius:16px;
}

.preview-hint{
  position:absolute;
  color:var(--muted);
  font-size:14px;
}

/* ===== TOP BAR ===== */

.top-bar{
  position:absolute;
  top:12px;
  left:12px;
}

.stream-name{
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
}

/* ===== RECORD ===== */

.record-bar{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  align-items:center;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
}

.record-dot{
  width:12px;
  height:12px;
  background:var(--red);
  border-radius:50%;
}

/* ===== RIGHT CAMERA STRIP ===== */

.strip{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.camera-slot{
  height:140px;
  background:#000;
  border-radius:14px;
  border:2px solid var(--border);
  overflow:hidden;
  position:relative;
  cursor:pointer;
}

.camera-slot video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.placeholder{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:12px;
  pointer-events:none;
}

.camera-slot.active{
  border-color:var(--blue);
}
</style>
</head>

<body>

<div class="director">

  <!-- PREVIEW -->
  <div class="preview">
    <video id="mainVideo" autoplay muted playsinline></video>
    <div class="preview-hint" id="previewHint">Select a camera to preview</div>

    <div class="top-bar">
      <div class="stream-name" id="streamTitle">CourtStream • LIVE</div>
    </div>

    <div class="record-bar">
      <div class="record-dot"></div>
      <div>00:00:00</div>
    </div>
  </div>

  <!-- RIGHT CAMERA STRIP (FIXED 3) -->
  <div class="strip" id="strip">
    <div class="camera-slot"><video></video><div class="placeholder">Waiting for camera</div></div>
    <div class="camera-slot"><video></video><div class="placeholder">Waiting for camera</div></div>
    <div class="camera-slot"><video></video><div class="placeholder">Waiting for camera</div></div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const socket = io();

const mainVideo = document.getElementById("mainVideo");
const previewHint = document.getElementById("previewHint");
const slots = Array.from(document.querySelectorAll(".camera-slot"));

const peers = {};
let slotIndex = 0;

/* JOIN */
socket.emit("join", streamId);

/* CAMERA JOINED */
socket.on("peer-joined", ({id}) => {
  if (slotIndex >= slots.length) return;

  const slot = slots[slotIndex++];
  const video = slot.querySelector("video");
  const placeholder = slot.querySelector(".placeholder");

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peers[id] = { pc, video, slot };

  pc.addTransceiver("video", { direction:"recvonly" });

  pc.ontrack = e => {
    video.srcObject = e.streams[0];
    placeholder.style.display = "none";
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,data:e.candidate});
    }
  };

  slot.onclick = () => {
    mainVideo.srcObject = video.srcObject;
    previewHint.style.display = "none";
    slots.forEach(s=>s.classList.remove("active"));
    slot.classList.add("active");
  };

  pc.createOffer()
    .then(o=>pc.setLocalDescription(o))
    .then(()=>{
      socket.emit("signal",{to:id,data:pc.localDescription});
    });
});

/* SIGNAL */
socket.on("signal", async ({from,data})=>{
  const peer = peers[from];
  if(!peer) return;

  if(data.type){
    await peer.pc.setRemoteDescription(data);
  }
  if(data.candidate){
    await peer.pc.addIceCandidate(data);
  }
});
</script>

</body>
</html>
