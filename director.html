<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#000;color:white}
#main video{width:100vw;height:100vh;object-fit:contain}
</style>
</head>

<body>
<div id="main">
  <video id="program" autoplay muted playsinline></video>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const streamId = new URLSearchParams(location.search).get("stream");
const program = document.getElementById("program");

const peers = {};

/* JOIN */
socket.emit("join", streamId);

/* EXISTING PEERS */
socket.on("existing-peers", list => {
  list.forEach(p => createPeer(p.id));
});

/* NEW PEER */
socket.on("peer-joined", p => {
  createPeer(p.id);
});

async function createPeer(id){
  if (peers[id]) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peers[id] = pc;

  pc.addTransceiver("video", { direction: "recvonly" });

  pc.ontrack = e => {
    console.log("🎥 TRACK RECEIVED");
    program.srcObject = e.streams[0];
  };

  pc.onicecandidate = e =>
    e.candidate && socket.emit("signal", { to:id, data:e.candidate });

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("signal", { to:id, data:offer });
}

/* SIGNAL */
socket.on("signal", async ({from,data})=>{
  const pc = peers[from];
  if (!pc) return;

  if (data.type === "answer") await pc.setRemoteDescription(data);
  if (data.candidate) await pc.addIceCandidate(data);
});
</script>
</body>
</html>
