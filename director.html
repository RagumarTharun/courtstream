<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0f1115;--panel:#161922;--border:#262b3d;
  --text:#e6e6eb;--muted:#9aa0b4;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui;height:100vh}
.director{display:grid;grid-template-columns:1fr 320px;gap:14px;padding:14px;height:100%}
.panel{background:var(--panel);border-radius:16px;border:1px solid var(--border)}
.main-feed{position:relative;background:#000}
.main-feed::before{content:"";display:block;padding-top:56.25%}
.main-feed video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.side-panel{padding:12px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.camera-slot{height:140px;background:#000;border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer}
.camera-slot video{width:100%;height:100%;object-fit:contain}
</style>
</head>

<body>
<div class="director">

  <div class="panel main-feed">
    <video id="mainVideo" autoplay muted playsinline></video>
    <div id="placeholder" class="placeholder">Select a camera</div>
  </div>

  <div class="panel side-panel" id="strip"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const socket = io();
const strip = document.getElementById("strip");
const mainVideo = document.getElementById("mainVideo");
const placeholder = document.getElementById("placeholder");

const peers = {};

/* JOIN */
socket.emit("join", streamId);

/* CAMERA JOINED */
socket.on("peer-joined", ({id})=>{
  if(peers[id]) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });
  pc.addTransceiver("video",{direction:"recvonly"});

  const slot = document.createElement("div");
  slot.className = "camera-slot";
  strip.appendChild(slot);

  peers[id] = { pc, slot };

  pc.ontrack = e=>{
    if(peers[id].stream) return;
    peers[id].stream = e.streams[0];

    const v = document.createElement("video");
    v.autoplay = true;
    v.muted = true;
    v.playsInline = true;
    v.srcObject = e.streams[0];
    slot.appendChild(v);

    slot.onclick = ()=>{
      mainVideo.srcObject = e.streams[0];
      placeholder.style.display = "none";
    };
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,data:e.candidate});
    }
  };

  pc.createOffer()
    .then(o=>pc.setLocalDescription(o))
    .then(()=>socket.emit("signal",{to:id,data:pc.localDescription}));
});

/* CAMERA LEFT */
socket.on("peer-left", ({id})=>{
  const p = peers[id];
  if(!p) return;
  p.pc.close();
  p.slot.remove();
  if(mainVideo.srcObject === p.stream){
    mainVideo.srcObject = null;
    placeholder.style.display = "flex";
  }
  delete peers[id];
});

/* SIGNAL */
socket.on("signal", async ({from,data})=>{
  const p = peers[from];
  if(!p) return;
  if(data.type) await p.pc.setRemoteDescription(data);
  if(data.candidate) await p.pc.addIceCandidate(data);
});
</script>
</body>
</html>
