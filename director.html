<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#0f1115;
  --panel:#161922;
  --border:#262b3d;
  --text:#e6e6eb;
  --muted:#9aa0b4;
  --blue:#3b82f6;
  --green:#22c55e;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  height:100vh;
}

/* ===== LAYOUT ===== */
.director{
  display:grid;
  grid-template-columns:1fr 300px;
  grid-template-rows:1fr 130px;
  gap:14px;
  padding:14px;
  height:100vh;
}

/* ===== PANELS ===== */
.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
}

/* ===== MAIN FEED ===== */
.main-feed{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.main-feed video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* TOP BAR */
.top-bar{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  display:flex;
  justify-content:space-between;
}

.badge{
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
}

/* RECORD BAR */
.record-bar{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  align-items:center;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:6px 12px;
  border-radius:999px;
}

.record-dot{
  width:10px;
  height:10px;
  background:#ef4444;
  border-radius:50%;
}

/* ===== CAMERA STRIP ===== */
.camera-strip{
  display:flex;
  gap:12px;
  padding:12px;
  overflow-x:auto;
}

.camera-tile{
  min-width:180px;
  height:110px;
  background:#000;
  border-radius:12px;
  border:2px solid transparent;
  overflow:hidden;
  cursor:pointer;
}

.camera-tile.active{
  border-color:var(--blue);
}

.camera-tile video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== SIDE PANEL ===== */
.side-panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:12px;
}

.side-title{
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="director">

  <!-- MAIN -->
  <div class="panel main-feed">
    <video id="mainVideo" autoplay muted playsinline></video>

    <div class="top-bar">
      <div class="badge">CourtStream • LIVE</div>
      <div class="badge" style="color:var(--green)">Director</div>
    </div>

    <div class="record-bar">
      <div class="record-dot"></div>
      <span>00:00:00</span>
    </div>
  </div>

  <!-- SIDE PANEL (empty for now, future tools) -->
  <div class="panel side-panel">
    <div class="side-title">Connected Cameras</div>
  </div>

  <!-- CAMERA STRIP (DYNAMIC) -->
  <div class="panel camera-strip" id="strip"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* =========================
   EXISTING LOGIC (UNCHANGED)
========================= */

const streamId = new URLSearchParams(location.search).get("stream");
const socket = io();
const peers = {};
const strip = document.getElementById("strip");
const mainVideo = document.getElementById("mainVideo");

socket.emit("join",{room:streamId,role:"director"});

function createPeer(id){
  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,data:{candidate:e.candidate}});
    }
  };

  pc.ontrack = e=>{
    if(peers[id]?.stream) return;

    const stream = e.streams[0];
    peers[id].stream = stream;

    const tile = document.createElement("div");
    tile.className = "camera-tile";

    const v = document.createElement("video");
    v.autoplay = true;
    v.playsInline = true;
    v.srcObject = stream;

    tile.appendChild(v);
    tile.onclick = ()=>setMain(stream,tile);

    strip.appendChild(tile);
    peers[id].tile = tile;

    if(!mainVideo.srcObject){
      setMain(stream,tile);
    }
  };

  peers[id] = { pc };
  return pc;
}

function setMain(stream,tile){
  mainVideo.srcObject = stream;
  document.querySelectorAll(".camera-tile").forEach(t=>t.classList.remove("active"));
  tile.classList.add("active");
}

socket.on("peer-joined", async ({id,role})=>{
  if(role!=="camera") return;
  const pc = createPeer(id);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("signal",{to:id,data:{sdp:offer}});
});

socket.on("signal", async ({from,data})=>{
  const peer = peers[from];
  if(!peer) return;
  if(data.sdp) await peer.pc.setRemoteDescription(data.sdp);
  if(data.candidate) await peer.pc.addIceCandidate(data.candidate);
});

socket.on("peer-left", ({id})=>{
  const peer = peers[id];
  if(!peer) return;
  peer.pc.close();
  peer.tile?.remove();
  delete peers[id];

  if(mainVideo.srcObject === peer.stream){
    mainVideo.srcObject = null;
  }
});
</script>

</body>
</html>
