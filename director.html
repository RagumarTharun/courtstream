<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --bg:#0f1115;
  --panel:#161922;
  --border:#262b3d;
  --text:#e6e6eb;
  --muted:#9aa0b4;
  --blue:#3b82f6;
  --red:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  height:100vh;
}

.director{
  display:grid;
  grid-template-columns:1fr 320px;
  grid-template-rows:1fr 140px;
  gap:14px;
  padding:14px;
  height:100%;
}

.panel{
  background:var(--panel);
  border-radius:16px;
  border:1px solid var(--border);
}

/* MAIN FEED */
.main-feed{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.main-feed video{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:16px;
  background:#000;
}

/* TOP BAR */
.top-bar{
  position:absolute;
  top:14px;
  left:14px;
  right:14px;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
}
.stream-info,.qr-box{
  pointer-events:auto;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
}
.qr-box{
  border-radius:14px;
  padding:8px;
}
.qr-box img{
  width:80px;height:80px;background:#000;
}

/* RECORD BAR (visual only) */
.record-bar{
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  align-items:center;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
}
.record-dot{
  width:14px;height:14px;border-radius:50%;
  background:var(--red);
}
.timer{font-size:13px}

/* CAMERA STRIP */
.camera-strip{
  display:flex;
  gap:12px;
}
.camera-tile{
  flex:1;
  background:#000;
  border-radius:14px;
  overflow:hidden;
  border:2px solid transparent;
  cursor:pointer;
  position:relative;
}
.camera-tile.active{
  border-color:var(--blue);
}
.camera-tile video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.camera-label{
  position:absolute;
  bottom:8px;
  left:8px;
  background:rgba(0,0,0,.6);
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
}

/* SIDE PANEL */
.side-panel{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.side-title{
  font-size:14px;
  color:var(--muted);
}
.side-camera{
  height:140px;
  background:#000;
  border-radius:14px;
  border:1px solid var(--border);
  overflow:hidden;
  position:relative;
}
.side-camera video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.side-camera span{
  position:absolute;
  bottom:8px;
  left:8px;
  background:rgba(0,0,0,.6);
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="director">

  <!-- MAIN FEED -->
  <div class="panel main-feed">
    <video id="mainVideo" autoplay muted playsinline></video>

    <div class="top-bar">
      <div class="stream-info">CourtStream • Live</div>
      <div class="qr-box"><img /></div>
    </div>

    <div class="record-bar">
      <div class="record-dot"></div>
      <div class="timer">00:00:00</div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="panel side-panel">
    <div class="side-title">Additional Cameras</div>
    <div class="side-camera"><span>Bench A</span></div>
    <div class="side-camera"><span>Bench B</span></div>
    <div class="side-camera"><span>Moving</span></div>
  </div>

  <!-- CAMERA STRIP -->
  <div class="camera-strip" id="strip"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const socket = io();

const peers = {}; // id -> { pc, stream, tile }
const mainVideo = document.getElementById("mainVideo");
const strip = document.getElementById("strip");

/* JOIN */
socket.emit("join", streamId);

/* EXISTING PEERS */
socket.on("existing-peers", list => {
  list.forEach(p => createPeer(p.id));
});

/* NEW CAMERA */
socket.on("peer-joined", p => {
  createPeer(p.id);
});

function createPeer(id){
  if (peers[id]) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peers[id] = { pc };

  // 🔑 critical for reliable receive
  pc.addTransceiver("video", { direction:"recvonly" });

  pc.ontrack = e => {
    if (peers[id].stream) return;

    const stream = e.streams[0];
    peers[id].stream = stream;

    const tile = document.createElement("div");
    tile.className = "camera-tile";

    const v = document.createElement("video");
    v.autoplay = true;
    v.muted = true;
    v.playsInline = true;
    v.srcObject = stream;

    const label = document.createElement("span");
    label.className = "camera-label";
    label.innerText = "Camera";

    tile.appendChild(v);
    tile.appendChild(label);
    strip.appendChild(tile);

    peers[id].tile = tile;

    tile.onclick = () => setMain(id);

    if (!mainVideo.srcObject) {
      setMain(id);
    }
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal", { to:id, data:e.candidate });
    }
  };

  pc.createOffer()
    .then(o => pc.setLocalDescription(o))
    .then(() => {
      socket.emit("signal", {
        to:id,
        data: pc.localDescription
      });
    });
}

function setMain(id){
  const peer = peers[id];
  if (!peer || !peer.stream) return;

  mainVideo.srcObject = peer.stream;

  document
    .querySelectorAll(".camera-tile")
    .forEach(t => t.classList.remove("active"));

  peer.tile.classList.add("active");
}

/* SIGNAL */
socket.on("signal", async ({from,data})=>{
  const peer = peers[from];
  if (!peer) return;

  if (data.type === "answer") {
    await peer.pc.setRemoteDescription(data);
  }
  if (data.candidate) {
    await peer.pc.addIceCandidate(data);
  }
});

/* CAMERA LEFT */
socket.on("camera-left", ({id})=>{
  const peer = peers[id];
  if (!peer) return;

  peer.pc.close();
  peer.tile?.remove();
  delete peers[id];

  if (mainVideo.srcObject === peer.stream) {
    mainVideo.srcObject = null;
  }
});
</script>

</body>
</html>
