<script>
const params = new URLSearchParams(location.search);
const streamId = params.get("stream");
const streamName = params.get("name") || streamId;

document.getElementById("streamBadge").innerText =
  streamName + " • LIVE";

const socket = io();
const mainVideo = document.getElementById("mainVideo");
const placeholder = document.getElementById("placeholder");
const strip = document.getElementById("cameraStrip");

const peers = {};
const rotations = {}; // 🔁 socketId -> degrees

socket.emit("join", streamId);

socket.on("peer-joined", ({ id }) => {
  if (peers[id]) return;
  createPeer(id);
});

socket.on("peer-left", ({ id }) => {
  const p = peers[id];
  if (!p) return;
  p.pc.close();
  p.slot.remove();
  delete peers[id];

  if (mainVideo.srcObject === p.stream) {
    mainVideo.srcObject = null;
    placeholder.style.display = "block";
  }
});

socket.on("camera-rotate", ({ from, rotation }) => {
  rotations[from] = rotation;
  const p = peers[from];
  if (!p) return;

  const v = p.slot.querySelector("video");
  if (v) v.style.transform = `rotate(${rotation}deg)`;

  if (mainVideo.srcObject === p.stream) {
    mainVideo.style.transform = `rotate(${rotation}deg)`;
  }
});

function createPeer(id){
  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.addTransceiver("video", { direction:"recvonly" });

  const slot = document.createElement("div");
  slot.className = "camera-slot";
  slot.innerHTML = "<span>Camera</span>";
  strip.appendChild(slot);

  peers[id] = { pc, slot };

  pc.ontrack = e => {
    if (peers[id].stream) return;

    const stream = e.streams[0];
    peers[id].stream = stream;

    const v = document.createElement("video");
    v.autoplay = true;
    v.muted = true;
    v.playsInline = true;
    v.srcObject = stream;
    v.style.transform = `rotate(${rotations[id] || 0}deg)`;

    slot.prepend(v);

    slot.onclick = () => {
      mainVideo.srcObject = stream;
      mainVideo.style.transform =
        `rotate(${rotations[id] || 0}deg)`;
      placeholder.style.display = "none";
    };
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal",{ to:id, data:e.candidate });
    }
  };

  pc.createOffer()
    .then(o => pc.setLocalDescription(o))
    .then(() => {
      socket.emit("signal",{ to:id, data:pc.localDescription });
    });
}

socket.on("signal", async ({ from, data }) => {
  const p = peers[from];
  if (!p) return;

  if (data.type) await p.pc.setRemoteDescription(data);
  if (data.candidate) await p.pc.addIceCandidate(data);
});
</script>
