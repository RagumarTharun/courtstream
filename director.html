<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#0f1115;
  --panel:#161922;
  --border:#262b3d;
  --text:#e6e6eb;
  --muted:#9aa0b4;
  --red:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  height:100vh;
}

/* ===== LAYOUT ===== */
.director{
  display:grid;
  grid-template-columns: 1fr 320px;
  gap:14px;
  padding:14px;
  height:100%;
}

/* ===== PANELS ===== */
.panel{
  background:var(--panel);
  border-radius:16px;
  border:1px solid var(--border);
}

/* ===== MAIN PREVIEW ===== */
.main-feed{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  overflow:hidden;
}

/* Fixed preview size */
.main-feed::before{
  content:"";
  display:block;
  padding-top:56.25%;
}

.main-feed video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
  transform-origin:center center;
}

/* Placeholder */
.placeholder{
  position:absolute;
  color:var(--muted);
  font-size:14px;
  z-index:2;
}

/* Top-left badge */
.stream-badge{
  position:absolute;
  top:14px;
  left:14px;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
}

/* Record badge */
.record-bar{
  position:absolute;
  bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
}
.record-dot{
  width:10px;
  height:10px;
  background:var(--red);
  border-radius:50%;
}

/* ===== RIGHT CAMERA STRIPE ===== */
.side-panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:12px;
  overflow-y:auto;
}

.side-title{
  font-size:13px;
  color:var(--muted);
}

.camera-slot{
  height:140px;
  background:#000;
  border-radius:14px;
  border:1px solid var(--border);
  position:relative;
  overflow:hidden;
  cursor:pointer;
  flex-shrink:0;
}

.camera-slot video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
  transform-origin:center center;
}

.camera-slot span{
  position:absolute;
  bottom:8px;
  left:8px;
  font-size:12px;
  background:rgba(0,0,0,.6);
  padding:4px 8px;
  border-radius:999px;
  color:#fff;
}
</style>
</head>

<body>

<div class="director">

  <!-- MAIN PREVIEW -->
  <div class="panel main-feed">
    <video id="mainVideo" autoplay muted playsinline></video>
    <div id="placeholder" class="placeholder">Select a camera to preview</div>

    <div class="stream-badge" id="streamBadge"></div>

    <div class="record-bar">
      <div class="record-dot"></div>
      <div>00:00:00</div>
    </div>
  </div>

  <!-- RIGHT CAMERA STRIPE -->
  <div class="panel side-panel" id="cameraStrip">
    <div class="side-title">Cameras</div>
  </div>

</div>

<canvas
  id="programCanvas"
  width="1280"
  height="720"
  style="position:fixed;left:-9999px;top:0;opacity:0;pointer-events:none;"
></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ===== STREAM INFO ===== */
const params = new URLSearchParams(location.search);
const streamId = params.get("stream");
const streamName = params.get("name");

async function updateStreamBadge(){
  let name = streamName;

  if (!name && streamId) {
    try {
      const res = await fetch("/api/streams");
      if (res.ok) {
        const streams = await res.json();
        const match = streams.find(s => s.id === streamId);
        if (match) name = match.name;
      }
    } catch {
      // fallback below
    }
  }

  const label = name || streamId || "Unknown Stream";
  document.getElementById("streamBadge").innerText =
    label + " • LIVE";
}
updateStreamBadge();

/* ===== SOCKET / STATE ===== */
const socket = io();
const mainVideo = document.getElementById("mainVideo");
const placeholder = document.getElementById("placeholder");
const strip = document.getElementById("cameraStrip");
const programCanvas = document.getElementById("programCanvas");
const programCtx = programCanvas.getContext("2d");

const peers = {};      // camera socketId -> { pc, stream, slot }
const viewers = {};    // viewer socketId -> { pc, sender }
const rotations = {}; // socketId -> rotation degrees
let currentLiveId = null;
let programStream = null;
let programRotation = 0;
let programLoopRunning = false;

/* ===== JOIN ===== */
socket.emit("join", { room: streamId, role: "director" });

/* ===== EXISTING PEERS ===== */
socket.on("existing-peers", peersList => {
  if (!Array.isArray(peersList)) return;
  peersList.forEach(({ id, role }) => {
    if (!id) return;
    if (role === "viewer") {
      if (!viewers[id]) createViewerPeer(id);
      return;
    }
    if (!peers[id]) createPeer(id);
  });
});

/* ===== PEER JOINED ===== */
socket.on("peer-joined", ({ id, role }) => {
  if (!id) return;
  if (role === "viewer") {
    if (viewers[id]) return;
    createViewerPeer(id);
    return;
  }
  if (peers[id]) return;
  createPeer(id);
});

socket.on("viewer-ready", ({ id }) => {
  if (!id) return;
  if (!viewers[id]) createViewerPeer(id);
});

/* ===== PEER LEFT ===== */
function removePeer(id){
  const p = peers[id];
  if (!p) return;

  p.pc.close();
  p.slot.remove();
  delete peers[id];
  delete rotations[id];

  if (mainVideo.srcObject === p.stream) {
    mainVideo.srcObject = null;
    mainVideo.style.transform = "";
    placeholder.style.display = "block";
  }
}

socket.on("peer-left", ({ id }) => {
  if (viewers[id]) {
    const v = viewers[id];
    v.pc.close();
    delete viewers[id];
    return;
  }
  removePeer(id);
});

socket.on("camera-left", ({ id }) => {
  if (viewers[id]) {
    const v = viewers[id];
    v.pc.close();
    delete viewers[id];
    return;
  }
  removePeer(id);
});

/* ===== CAMERA ROTATION (MANUAL) ===== */
socket.on("camera-rotate", ({ from, rotation }) => {
  rotations[from] = rotation;
  const p = peers[from];
  if (!p) return;

  const v = p.slot.querySelector("video");
  if (v) v.style.transform = `rotate(${rotation}deg)`;

  if (mainVideo.srcObject === p.stream) {
    mainVideo.style.transform = `rotate(${rotation}deg)`;
  }
});

/* ===== CREATE CAMERA PEER ===== */
function createPeer(id){
  const pc = new RTCPeerConnection({
    iceServers: [
      {
        urls: [
          "stun:stun.cloudflare.com:3478",
          "stun:stun.cloudflare.com:53"
        ]
      },
      {
        urls: [
          "turn:turn.cloudflare.com:3478?transport=udp",
          "turn:turn.cloudflare.com:3478?transport=tcp",
          "turns:turn.cloudflare.com:5349?transport=tcp",
          "turn:turn.cloudflare.com:53?transport=udp",
          "turn:turn.cloudflare.com:80?transport=tcp",
          "turns:turn.cloudflare.com:443?transport=tcp"
        ],
        username: "g07ef1b745ad2a747da14d563e4bfbd538f21945297c2fad25578fb243c68286",
        credential: "3882b29cc1772be95d469efdb14ccd45ed1b79ec8c52d9e0d8070720e093b43d"
      }
    ]
  });

  pc.addTransceiver("video", { direction:"recvonly" });

  const slot = document.createElement("div");
  slot.className = "camera-slot";
  slot.innerHTML = "<span>Camera</span>";
  strip.appendChild(slot);

  peers[id] = { pc, slot };

  pc.ontrack = e => {
    if (peers[id].stream) return;

    const stream = e.streams[0];
    peers[id].stream = stream;

    const v = document.createElement("video");
    v.autoplay = true;
    v.muted = true;
    v.playsInline = true;
    v.srcObject = stream;
    v.style.transform = `rotate(${rotations[id] || 0}deg)`;

    v.onloadedmetadata = () => v.play().catch(()=>{});

    slot.prepend(v);

    slot.onclick = () => {
      mainVideo.srcObject = stream;
      mainVideo.style.transform =
        `rotate(${rotations[id] || 0}deg)`;
      placeholder.style.display = "none";
      mainVideo.onloadedmetadata = () =>
        mainVideo.play().catch(()=>{});

      setLiveCamera(id);
    };
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal",{ to:id, data:e.candidate });
    }
  };

  pc.createOffer()
    .then(o => pc.setLocalDescription(o))
    .then(() => {
      socket.emit("signal",{ to:id, data:pc.localDescription });
    });
}

/* ===== LIVE CAMERA ===== */
function setLiveCamera(id){
  if (!id || !peers[id]) return;
  currentLiveId = id;
  programRotation = rotations[id] || 0;
  programStream = null;

  Object.keys(peers).forEach(peerId => {
    socket.emit("control", {
      to: peerId,
      data: { type: "live", on: peerId === id }
    });
  });

  startProgramLoop();
  updateViewerFeeds();
  setTimeout(updateViewerFeeds, 500);
}

/* ===== VIEWERS ===== */
function createViewerPeer(id){
  const pc = new RTCPeerConnection({
    iceServers: [
      {
        urls: [
          "stun:stun.cloudflare.com:3478",
          "stun:stun.cloudflare.com:53"
        ]
      },
      {
        urls: [
          "turn:turn.cloudflare.com:3478?transport=udp",
          "turn:turn.cloudflare.com:3478?transport=tcp",
          "turns:turn.cloudflare.com:5349?transport=tcp",
          "turn:turn.cloudflare.com:53?transport=udp",
          "turn:turn.cloudflare.com:80?transport=tcp",
          "turns:turn.cloudflare.com:443?transport=tcp"
        ],
        username: "g07ef1b745ad2a747da14d563e4bfbd538f21945297c2fad25578fb243c68286",
        credential: "3882b29cc1772be95d469efdb14ccd45ed1b79ec8c52d9e0d8070720e093b43d"
      }
    ]
  });

  const transceiver = pc.addTransceiver("video", { direction: "sendonly" });
  viewers[id] = { pc, sender: transceiver.sender };

  startProgramLoop();
  const track = getProgramTrack();
  if (track) transceiver.sender.replaceTrack(track);

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal",{ to:id, data:e.candidate });
    }
  };

  pc.createOffer()
    .then(o => pc.setLocalDescription(o))
    .then(() => {
      socket.emit("signal",{ to:id, data:pc.localDescription });
    });
}

function updateViewerFeeds(){
  const track = getProgramTrack();

  Object.values(viewers).forEach(v => {
    if (!v.sender) return;
    v.sender.replaceTrack(track || null);
  });
}

function getProgramTrack(){
  if (!programStream) {
    if (mainVideo && mainVideo.captureStream && mainVideo.readyState >= 2) {
      programStream = mainVideo.captureStream(30);
    } else if (programCanvas && programCanvas.captureStream) {
      programStream = programCanvas.captureStream(30);
    } else {
      return null;
    }
  }
  const tracks = programStream.getVideoTracks();
  return tracks && tracks[0] ? tracks[0] : null;
}

function startProgramLoop(){
  if (programLoopRunning) return;
  programLoopRunning = true;

  const draw = () => {
    const w = programCanvas.width;
    const h = programCanvas.height;

    programCtx.fillStyle = "#000";
    programCtx.fillRect(0, 0, w, h);

    if (mainVideo.readyState >= 2 && mainVideo.videoWidth > 0 && mainVideo.videoHeight > 0) {
      const vw = mainVideo.videoWidth;
      const vh = mainVideo.videoHeight;
      const scale = Math.min(w / vw, h / vh);
      const dw = vw * scale;
      const dh = vh * scale;

      programCtx.save();
      programCtx.translate(w / 2, h / 2);
      programCtx.rotate((programRotation * Math.PI) / 180);
      programCtx.drawImage(mainVideo, -dw / 2, -dh / 2, dw, dh);
      programCtx.restore();
    }

    if (!programStream) {
      programStream = programCanvas.captureStream(30);
      updateViewerFeeds();
    }

    requestAnimationFrame(draw);
  };

  requestAnimationFrame(draw);
}

/* ===== SIGNAL ===== */
socket.on("signal", async ({ from, data }) => {
  const p = peers[from];
  const v = viewers[from];
  if (!p && !v) return;

  if (data.type) {
    if (p) await p.pc.setRemoteDescription(data);
    if (v) await v.pc.setRemoteDescription(data);
  }
  if (data.candidate) {
    if (p) await p.pc.addIceCandidate(data);
    if (v) await v.pc.addIceCandidate(data);
  }
});
</script>

</body>
</html>
