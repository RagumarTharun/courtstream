<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:black}
video{width:100vw;height:100vh;object-fit:contain}
</style>
</head>

<body>
<video id="main" autoplay playsinline></video>

<script src="/socket.io/socket.io.js"></script>
<script>
console.log("DIRECTOR JS RUNNING");

const streamId = new URLSearchParams(location.search).get("stream");
const socket = io();
const main = document.getElementById("main");

const peers = {};

socket.emit("join", {
  room: streamId,
  role: "director"
});

socket.on("peer-joined", async ({ id, role }) => {
  if (role !== "camera") return;

  const pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  peers[id] = pc;

  pc.ontrack = e => {
    console.log("TRACK RECEIVED");
    main.srcObject = e.streams[0];
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal", {
        to: id,
        data: { candidate: e.candidate }
      });
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  socket.emit("signal", {
    to: id,
    data: { sdp: offer }
  });
});

socket.on("signal", async ({ from, data }) => {
  const pc = peers[from];
  if (!pc) return;

  if (data.sdp) {
    await pc.setRemoteDescription(data.sdp);
  }
  if (data.candidate) {
    await pc.addIceCandidate(data.candidate);
  }
});
</script>
</body>
</html>
