<!DOCTYPE html>
<html>
<head>
  <title>Director</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

<header>
  <strong>Director</strong>
  <button id="qr">QR</button>
  <button id="rec" class="danger">● Record</button>
  <span id="time">00:00</span>
</header>

<main>
  <div id="program"></div>

  <div id="grid">
    <div data-pos="left"></div>
    <div data-pos="center"></div>
    <div data-pos="right"></div>
    <div data-pos="benchA"></div>
    <div data-pos="benchB"></div>
    <div data-pos="moving"></div>
  </div>
</main>

<canvas id="canvas" hidden></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
const socket = io();
const room = new URLSearchParams(location.search).get("room");
const peers={};
const streams={};

socket.emit("join",{room,role:"director"});

socket.on("peer-joined", ({id,position})=>{
  const pc=new RTCPeerConnection();
  peers[id]=pc;
  pc.addTransceiver("video",{direction:"recvonly"});
  pc.ontrack=e=>{
    const v=document.createElement("video");
    v.srcObject=e.streams[0];
    v.autoplay=true;
    streams[id]=v;
    document.querySelector(`[data-pos=${position}]`).appendChild(v);
  };
  pc.onicecandidate=e=>e.candidate &&
    socket.emit("signal",{to:id,data:e.candidate});
  pc.createOffer().then(o=>{
    pc.setLocalDescription(o);
    socket.emit("signal",{to:id,data:o});
  });
});

socket.on("signal",async({from,data})=>{
  const pc=peers[from];
  if(data.type==="answer") await pc.setRemoteDescription(data);
  if(data.candidate) await pc.addIceCandidate(data);
});
</script>
</body>
</html>
