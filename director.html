<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#0f1115;
  --panel:#161922;
  --border:#262b3d;
  --text:#e6e6eb;
  --muted:#9aa0b4;
  --red:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  height:100vh;
}

.director{
  display:grid;
  grid-template-columns: 1fr 320px;
  gap:14px;
  padding:14px;
  height:100%;
}

.panel{
  background:var(--panel);
  border-radius:16px;
  border:1px solid var(--border);
}

/* MAIN PREVIEW */
.main-feed{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}

.main-feed::before{
  content:"";
  display:block;
  padding-top:56.25%;
}

.main-feed video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
}

.placeholder{
  position:absolute;
  color:var(--muted);
  font-size:14px;
}

.stream-badge{
  position:absolute;
  top:14px;
  left:14px;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:6px 12px;
  border-radius:999px;
  font-size:13px;
}

.record-bar{
  position:absolute;
  bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(15,17,21,.85);
  border:1px solid var(--border);
  padding:6px 12px;
  border-radius:999px;
}

.record-dot{
  width:10px;
  height:10px;
  background:var(--red);
  border-radius:50%;
}

/* CAMERA STRIP */
.side-panel{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:12px;
  overflow-y:auto;
}

.side-title{
  font-size:13px;
  color:var(--muted);
}

.camera-slot{
  height:140px;
  background:#000;
  border-radius:14px;
  border:1px solid var(--border);
  position:relative;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.camera-slot video{
  width:100%;
  height:100%;
  object-fit:contain;
}

.camera-slot .label{
  position:absolute;
  bottom:8px;
  left:8px;
  font-size:12px;
  background:rgba(0,0,0,.6);
  padding:4px 8px;
  border-radius:999px;
}

.camera-slot .status{
  color:var(--muted);
  font-size:13px;
}
</style>
</head>

<body>

<div class="director">

  <div class="panel main-feed">
    <video id="mainVideo" autoplay muted playsinline></video>
    <div id="placeholder" class="placeholder">Select a camera to preview</div>

    <div class="stream-badge" id="streamBadge"></div>

    <div class="record-bar">
      <div class="record-dot"></div>
      <div>00:00:00</div>
    </div>
  </div>

  <div class="panel side-panel" id="cameraStrip">
    <div class="side-title">Cameras</div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const params = new URLSearchParams(location.search);
const streamId = params.get("stream");
document.getElementById("streamBadge").innerText = streamId + " • LIVE";

const socket = io();
const mainVideo = document.getElementById("mainVideo");
const placeholder = document.getElementById("placeholder");
const strip = document.getElementById("cameraStrip");

/*
cameraId → {
  socketId,
  pc,
  stream,
  slot
}
*/
const cameras = {};

/* JOIN */
socket.emit("join", streamId);

/* CAMERA JOINED */
socket.on("peer-joined", ({ id, cameraId }) => {
  if (!cameraId) return;

  // Reconnect case
  if (cameras[cameraId]) {
    cameras[cameraId].socketId = id;
    cameras[cameraId].status("Reconnected");
    return;
  }

  createCamera(cameraId, id);
});

/* CAMERA LEFT */
socket.on("peer-left", ({ id }) => {
  const cam = Object.values(cameras).find(c => c.socketId === id);
  if (!cam) return;

  cam.socketId = null;
  cam.status("Student left");
});

/* CREATE CAMERA */
function createCamera(cameraId, socketId){
  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.addTransceiver("video", { direction:"recvonly" });

  const slot = document.createElement("div");
  slot.className = "camera-slot";
  slot.innerHTML = `<div class="status">Connecting…</div>`;
  strip.appendChild(slot);

  cameras[cameraId] = {
    socketId,
    pc,
    slot,
    stream:null,
    status(text){
      slot.innerHTML = `<div class="status">${text}</div>`;
    }
  };

  pc.ontrack = e => {
    if (cameras[cameraId].stream) return;

    const stream = e.streams[0];
    cameras[cameraId].stream = stream;

    const v = document.createElement("video");
    v.autoplay = true;
    v.muted = true;
    v.playsInline = true;
    v.srcObject = stream;

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "Camera";

    slot.innerHTML = "";
    slot.appendChild(v);
    slot.appendChild(label);

    slot.onclick = () => {
      mainVideo.srcObject = stream;
      placeholder.style.display = "none";
    };
  };

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal",{ to:socketId, data:e.candidate });
    }
  };

  pc.createOffer()
    .then(o => pc.setLocalDescription(o))
    .then(() => {
      socket.emit("signal",{ to:socketId, data:pc.localDescription });
    });
}

/* SIGNAL */
socket.on("signal", async ({ from, data }) => {
  const cam = Object.values(cameras).find(c => c.socketId === from);
  if (!cam) return;

  if (data.type) await cam.pc.setRemoteDescription(data);
  if (data.candidate) await cam.pc.addIceCandidate(data);
});
</script>

</body>
</html>
