<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream – Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
/* --- SAME STYLES, UNCHANGED --- */
:root{--bg:#0f1115;--panel:#161922;--border:#262b3d;--text:#e6e6eb;--muted:#9aa0b4}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui;height:100vh}
.director{display:grid;grid-template-columns:1fr 320px;gap:14px;padding:14px;height:100%}
.panel{background:var(--panel);border-radius:16px;border:1px solid var(--border)}
</style>
</head>

<body>
<div class="director">
  <div class="panel main-feed">
    <video id="mainVideo" autoplay muted playsinline></video>
    <div id="placeholder">Select a camera</div>
  </div>
  <div class="panel" id="cameraStrip"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const socket = io();

const mainVideo = document.getElementById("mainVideo");
const strip = document.getElementById("cameraStrip");
const peers = {};

/* ===== JOIN ===== */
socket.emit("join", streamId);

/* ===== EXISTING PEERS (CRITICAL FIX) ===== */
socket.on("existing-peers", list => {
  list.forEach(p => createPeer(p.id));
});

socket.on("peer-joined", ({ id }) => createPeer(id));
socket.on("peer-left", ({ id }) => removePeer(id));

/* ===== PEER ===== */
function removePeer(id){
  const p = peers[id];
  if (!p) return;
  p.pc.close();
  p.slot.remove();
  delete peers[id];

  if (mainVideo.srcObject === p.stream) {
    mainVideo.srcObject = null;
  }
}

function createPeer(id){
  if (peers[id]) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.addTransceiver("video",{direction:"recvonly"});

  const slot = document.createElement("div");
  slot.textContent = "Camera";
  strip.appendChild(slot);

  peers[id] = { pc, slot };

  pc.ontrack = e => {
    peers[id].stream = e.streams[0];
    slot.onclick = ()=>{
      mainVideo.srcObject = e.streams[0];
      mainVideo.play().catch(()=>{});
    };
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{ to:id, data:e.candidate });
    }
  };

  pc.createOffer()
    .then(o=>pc.setLocalDescription(o))
    .then(()=>socket.emit("signal",{ to:id, data:pc.localDescription }));
}

/* ===== SIGNAL ===== */
socket.on("signal", async ({ from, data }) => {
  const p = peers[from];
  if (!p) return;

  if (data.type) await p.pc.setRemoteDescription(data);
  if (data.candidate) await p.pc.addIceCandidate(data);
});
</script>
</body>
</html>
