<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Director – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0f1115;
  --card:#161922;
  --border:#262b3d;
  --blue:#3b82f6;
  --green:#22c55e;
  --muted:#9aa0b4;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui;
}

.page{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header{
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:500;
  border-bottom:1px solid var(--border);
}

/* MAIN VIDEO */
.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
}
.main video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* CAM STRIP */
.strip{
  display:flex;
  gap:12px;
  padding:12px;
  overflow-x:auto;
  border-top:1px solid var(--border);
}
.tile{
  min-width:140px;
  height:90px;
  background:#000;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  border:2px solid transparent;
}
.tile.active{
  border-color:var(--blue);
}
.tile video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.label{
  position:absolute;
  bottom:4px;
  left:6px;
  font-size:11px;
  background:rgba(0,0,0,.6);
  padding:2px 6px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    Director • <span style="color:var(--green);margin-left:6px;">LIVE</span>
  </div>

  <!-- MAIN FEED -->
  <div class="main">
    <video id="mainVideo" autoplay muted playsinline></video>
  </div>

  <!-- CAMERA STRIP -->
  <div class="strip" id="strip"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId = new URLSearchParams(location.search).get("stream");
const socket = io();

const peers = {}; // socketId -> { pc, video }
const mainVideo = document.getElementById("mainVideo");
const strip = document.getElementById("strip");

/* JOIN AS DIRECTOR */
socket.emit("join",{room:streamId,role:"director"});

/* CREATE PEER */
function createPeer(socketId){
  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pc.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{
        to:socketId,
        data:{candidate:e.candidate}
      });
    }
  };

  pc.ontrack = e=>{
    if(peers[socketId].stream) return;
    const stream = e.streams[0];
    peers[socketId].stream = stream;

    // thumbnail
    const tile = document.createElement("div");
    tile.className = "tile";
    const v = document.createElement("video");
    v.autoplay = true;
    v.playsInline = true;
    v.srcObject = stream;

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "Camera";

    tile.appendChild(v);
    tile.appendChild(label);

    tile.onclick = ()=>{
      setMain(stream, tile);
    };

    strip.appendChild(tile);
    peers[socketId].tile = tile;

    // first camera auto-main
    if(!mainVideo.srcObject){
      setMain(stream, tile);
    }
  };

  peers[socketId] = { pc };
  return pc;
}

/* SET MAIN FEED */
function setMain(stream, tile){
  mainVideo.srcObject = stream;
  document.querySelectorAll(".tile").forEach(t=>t.classList.remove("active"));
  tile.classList.add("active");
}

/* CAMERA JOINED */
socket.on("peer-joined", async ({id,role})=>{
  if(role!=="camera") return;
  const pc = createPeer(id);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit("signal",{to:id,data:{sdp:offer}});
});

/* SIGNALS */
socket.on("signal", async ({from,data})=>{
  const peer = peers[from];
  if(!peer) return;

  if(data.sdp){
    await peer.pc.setRemoteDescription(data.sdp);
  }
  if(data.candidate){
    await peer.pc.addIceCandidate(data.candidate);
  }
});

/* CAMERA LEFT */
socket.on("peer-left", ({id})=>{
  const peer = peers[id];
  if(!peer) return;
  peer.pc.close();
  if(peer.tile) peer.tile.remove();
  delete peers[id];

  if(mainVideo.srcObject === peer?.stream){
    mainVideo.srcObject = null;
  }
});
</script>

</body>
</html>
