<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CourtStream – Personal Training</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        :root {
            --bg: #0f1115;
            --panel: #161922;
            --border: #262b3d;
            --text: #e6e6eb;
            --muted: #9aa0b4;
            --blue: #3b82f6;
            --red: #ef4444;
            --green: #22c55e;
            --orange: #f97316;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* HEADER */
        header {
            height: 64px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            font-size: 20px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
        }

        button {
            cursor: pointer;
            border: none;
            background: var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: #333;
        }

        button.primary {
            background: var(--blue);
            color: white;
        }

        button.primary:hover {
            background: #2563eb;
        }

        button.danger {
            background: var(--red);
            color: white;
        }

        button.danger:hover {
            background: #dc2626;
        }

        /* CONTAINER */
        .container {
            width: 100%;
            height: calc(100vh - 64px);
            position: relative;
            overflow: hidden;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        .video-section {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video {
            /* Crucial for Safari to decode frames: do not use display none or visibility hidden */
            opacity: 0.01;
            position: absolute;
            width: 1px;
            height: 1px;
            z-index: -1;
            pointer-events: none;
        }

        #output {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        #toggleDashboardBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(22, 25, 34, 0.8);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dashboard {
            position: absolute;
            right: 20px;
            top: 60px; /* Moved down to make room for toggle button */
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            /* Custom scrollbar for dashboard */
            scrollbar-width: none;
        }
        .dashboard::-webkit-scrollbar { display: none; }

        .card {
            background: rgba(22, 25, 34, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
        }

        @media(max-width: 768px) {
            #toggleDashboardBtn {
                top: 10px;
                right: 10px;
            }
            .dashboard {
                top: 50px;
                bottom: auto;
                right: 10px;
                width: 260px;
                padding: 0;
                flex-direction: column;
                overflow-x: hidden;
                overflow-y: auto;
                gap: 8px;
            }
            .card {
                min-width: 100%;
                flex-shrink: 0;
                padding: 12px;
                background: rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
            }
            .card h2 {
                font-size: 14px;
                margin-bottom: 8px;
            }
            .desktop-only {
                display: none;
            }
            #transcriptBox {
                max-height: 80px !important;
            }
        }

        h2 {
            margin: 0 0 16px;
            font-size: 20px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: var(--muted);
            font-weight: 500;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .metric-value.good {
            color: var(--green);
        }

        .metric-value.bad {
            color: var(--orange);
        }

        .feedback-box {
            margin-top: 16px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--blue);
            font-weight: 600;
            text-align: center;
            font-size: 16px;
            transition: all 0.3s;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.7);
            padding: 16px 24px;
            border-radius: 8px;
        }

        .loader-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--bg);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="brand">
            <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" stroke="var(--red)" />
                <path d="M2.5 12h19M12 2.5a14 14 0 0 1 0 19M12 2.5a14 14 0 0 0 0 19" stroke="var(--red)"
                    stroke-width="1.5" opacity="0.5" />
                <path d="M10 8l6 4-6 4V8z" fill="white" stroke="none" />
            </svg>
            CourtStream Training
        </a>
    </header>

    <div class="container">
        <div id="loader" class="loader-overlay">
            <div class="spinner"></div>
            <h2>Loading AI Models...</h2>
            <p style="color: var(--muted); margin-top:10px;">Please wait</p>
        </div>

        <div class="video-section">
            <video id="video" playsinline></video>
            <canvas id="output"></canvas>
        </div>

        <button id="toggleDashboardBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>

        <div class="dashboard" id="dashboardPanel">
            <div class="card">
                <div class="controls" style="justify-content: space-around;">
                    <button id="startBtn" class="primary" title="Start Session">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                    <button id="stopBtn" class="danger" style="display:none;" title="Stop Session">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><rect x="6" y="6" width="12" height="12"/></svg>
                    </button>
                    <button id="switchCamBtn" title="Switch Camera">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                    </button>
                    <input type="file" id="videoUpload" accept="video/*" style="display: none;">
                    <button id="uploadBtn" title="Upload Video">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    </button>
                </div>
                <p class="desktop-only" style="color:var(--muted); font-size:13px;">
                    Stand back so your full body is visible. Mimic a shooting motion to get real-time feedback. The session and AI overlays will be recorded.
                </p>
            </div>

            <div class="card">
                <div class="angle-display">
                    <span style="display:flex; align-items:center; gap:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Elbow</span>
                    <span class="angle-value" id="elbowAngle">--°</span>
                </div>
                <div class="angle-display">
                    <span style="display:flex; align-items:center; gap:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v16m-8-8h16"/></svg> Knees</span>
                    <span class="angle-value" id="kneeAngle">--°</span>
                </div>
                <div class="angle-display" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);">
                    <span style="font-weight: bold; color: var(--green); display:flex; align-items:center; gap:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M5.4 5.4l13.2 13.2M18.6 5.4L5.4 18.6"/></svg> Shots</span>
                    <span class="angle-value" id="shotCount" style="color: var(--green);">0</span>
                </div>

                <div class="feedback-box" id="feedbackMsg">
                    Waiting for shot...
                </div>
            </div>

            <div class="card">
                <h2>Session Transcript</h2>
                <div id="transcriptBox" style="max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px; font-size: 13px; color: var(--text); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px;">
                    <div style="color: var(--muted);">Waiting for session to start...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load TensorFlow.js and Pose Detection Models -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <script src="training.js?v=13"></script>

</body>

</html>
