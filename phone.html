<!DOCTYPE html>
<html>
<head>
  <title>Live Camera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: system-ui, Arial;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOP BAR */
    #topBar {
      padding: 10px 12px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #222;
    }

    #startBtn {
      background: #e62117;
      border: none;
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 14px;
      color: white;
      font-weight: bold;
    }

    #liveBadge {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #ff3b3b;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #ff3b3b;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1 }
      50% { opacity: .4 }
      100% { opacity: 1 }
    }

    /* MAIN */
    #main {
      flex: 1;
      display: flex;
      background: black;
    }

    #videoWrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    video {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    /* SIDE CONTROLS */
    #sidePanel {
      width: 70px;
      background: rgba(0,0,0,.7);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 12px 6px;
    }

    .ctrlBtn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #222;
      color: white;
      font-size: 16px;
    }

    input[type=range] {
      writing-mode: bt-lr;
      transform: rotate(-90deg);
      width: 80px;
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div id="topBar">
  <button id="startBtn">🎥 Start Camera</button>

  <div id="liveBadge">
    <div class="dot"></div>
    LIVE
  </div>
</div>

<!-- MAIN AREA -->
<div id="main">
  <div id="videoWrap">
    <video id="local" autoplay playsinline muted></video>
  </div>

  <div id="sidePanel">
    <button class="ctrlBtn" id="flipBtn">🔄</button>
    <button class="ctrlBtn" onclick="setZoom(1)">1×</button>
    <button class="ctrlBtn" onclick="setZoom(1.5)">1.5×</button>
    <button class="ctrlBtn" onclick="setZoom(2)">2×</button>
    <input type="range" min="1" max="3" step="0.1" value="1" id="zoomSlider">
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  if (location.protocol !== "https:") {
    document.body.innerHTML =
      "<h2 style='padding:20px'>❌ Open using HTTPS</h2>";
    throw new Error("HTTPS required");
  }

  const socket = io();
  const room = new URLSearchParams(location.search).get("room") || "room1";

  let pc, stream;
  let facing = "environment";
  let currentZoom = 1;

  const video = document.getElementById("local");
  const startBtn = document.getElementById("startBtn");
  const flipBtn = document.getElementById("flipBtn");
  const sidePanel = document.getElementById("sidePanel");
  const liveBadge = document.getElementById("liveBadge");
  const zoomSlider = document.getElementById("zoomSlider");

  async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: facing,
        width: { ideal: 1280 },
        height: { ideal: 720 },
        frameRate: { ideal: 30 }
      },
      audio: false
    });

    video.srcObject = stream;

    startBtn.style.display = "none";
    sidePanel.style.display = "flex";
    liveBadge.style.display = "flex";

    socket.emit("join", room);
  }

  startBtn.onclick = startCamera;

  flipBtn.onclick = async () => {
    facing = facing === "environment" ? "user" : "environment";
    await startCamera();
  };

  async function setZoom(z) {
    currentZoom = z;
    zoomSlider.value = z;
    applyZoom();
  }

  async function applyZoom() {
    if (!stream) return;
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities?.();

    if (caps?.zoom) {
      await track.applyConstraints({ advanced: [{ zoom: currentZoom }] });
    } else {
      video.style.transform = `scale(${currentZoom})`;
    }
  }

  zoomSlider.oninput = e => {
    currentZoom = Number(e.target.value);
    applyZoom();
  };

  socket.on("signal", async ({ from, data }) => {
    if (data.type === "offer") {
      pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
      });

      stream.getTracks().forEach(t => pc.addTrack(t, stream));

      pc.onicecandidate = e =>
        e.candidate && socket.emit("signal", { to: from, data: e.candidate });

      await pc.setRemoteDescription(data);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit("signal", { to: from, data: answer });
    }

    if (data.candidate && pc) await pc.addIceCandidate(data);
  });

  socket.on("program", ({ cameraId }) => {
    // Live indicator is already shown, but you could
    // add extra effects here if this cam goes live
  });

  window.addEventListener("beforeunload", () => {
    socket.disconnect();
    if (stream) stream.getTracks().forEach(t => t.stop());
  });
</script>

</body>
</html>
