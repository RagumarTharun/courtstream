<!DOCTYPE html>
<html>
<head>
  <title>Camera Join</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body class="center">

<form class="card">
  <h3>Camera Preview</h3>

  <video id="preview" autoplay muted playsinline></video>

  <label>Position</label>
  <select id="pos">
    <option value="center">Center</option>
    <option value="left">Left</option>
    <option value="right">Right</option>
    <option value="benchA">Bench A</option>
    <option value="benchB">Bench B</option>
    <option value="moving">Moving</option>
  </select>

  <button class="primary" type="button" onclick="join()">Join</button>
</form>

<script>
const room = new URLSearchParams(location.search).get("room");
let res;

fetch(`/api/courtstream/${room}`)
  .then(r=>r.json())
  .then(c=>{
    res = c.resolution.split("x").map(Number);
    navigator.mediaDevices.getUserMedia({
      video:{ width:res[0], height:res[1] },
      audio:false
    }).then(s=>{
      preview.srcObject = s;
      window.stream = s;
    });
  });

function join(){
  sessionStorage.setItem("pos", pos.value);
  location.href = `phone.html?room=${room}`;
}
</script>
</body>
</html>
