<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Preview – CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root{
  --bg:#0f1115;
  --card:#161922;
  --border:#262b3d;
  --blue:#3b82f6;
  --red:#b91c1c;
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:system-ui;
}

/* FULL SCREEN PREVIEW */
.preview{
  position:fixed;
  inset:0;
  background:#000;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TOP BAR */
.topbar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);
  font-size:15px;
}

/* CENTER CONTROLS */
.center-controls{
  position:absolute;
  left:50%;
  bottom:140px;
  transform:translateX(-50%);
  display:flex;
  gap:22px;
}
.ctrl{
  width:64px;
  height:64px;
  border-radius:50%;
  border:none;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:24px;
}
.ctrl.off{
  background:var(--red);
}

/* BOTTOM SHEET */
.sheet{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  background:var(--card);
  border-top-left-radius:22px;
  border-top-right-radius:22px;
  padding:20px;
  border-top:1px solid var(--border);
}
.label{
  font-size:13px;
  color:#9aa0b4;
  margin-bottom:6px;
}
.range{
  width:100%;
}
.row{
  display:flex;
  gap:12px;
  margin-top:14px;
}
.small{
  flex:1;
  padding:10px;
  border-radius:999px;
  border:1px solid var(--border);
  background:#0f1115;
  color:#fff;
}
.join{
  width:100%;
  margin-top:18px;
  padding:14px;
  border-radius:999px;
  border:none;
  background:var(--blue);
  color:#fff;
  font-size:16px;
}
</style>
</head>

<body>

<div class="preview">
  <video id="video" autoplay muted playsinline></video>

  <!-- TOP BAR -->
  <div class="topbar">
    <span>☰</span>
    <strong>CourtStream</strong>
    <span>🔊</span>
  </div>

  <!-- CENTER CONTROLS -->
  <div class="center-controls">
    <button id="micBtn" class="ctrl" onclick="toggleMic()">🎙️</button>
    <button id="camBtn" class="ctrl" onclick="toggleCam()">🎥</button>
  </div>

  <!-- BOTTOM SHEET -->
  <div class="sheet">
    <div class="label">Zoom</div>
    <input
      class="range"
      type="range"
      min="1"
      max="3"
      step="0.1"
      value="1"
      onchange="zoom(this.value)"
    >

    <div class="row">
      <button class="small" onclick="flip()">🔄 Flip</button>
    </div>

    <button class="join" onclick="joinStream()">
      Join Stream
    </button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId =
  new URLSearchParams(location.search).get("stream");

const video = document.getElementById("video");
const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");

let mediaStream;
let micOn = true;
let camOn = true;
let facing = "user";

const socket = io();

/* CAMERA PREVIEW */
(async () => {
  try{
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing},
      audio:true
    });
    video.srcObject = mediaStream;
  }catch{
    alert("Camera & microphone permission required");
  }
})();

/* CONTROLS */
function toggleMic(){
  micOn = !micOn;
  mediaStream.getAudioTracks()[0].enabled = micOn;
  micBtn.classList.toggle("off",!micOn);
}

function toggleCam(){
  camOn = !camOn;
  mediaStream.getVideoTracks()[0].enabled = camOn;
  camBtn.classList.toggle("off",!camOn);
}

async function flip(){
  facing = facing==="user"?"environment":"user";
  mediaStream.getTracks().forEach(t=>t.stop());
  mediaStream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:facing},
    audio:true
  });
  video.srcObject = mediaStream;
}

function zoom(z){
  const track = mediaStream.getVideoTracks()[0];
  track.applyConstraints({advanced:[{zoom:Number(z)}]});
}

/* JOIN */
function joinStream(){
  socket.emit("join",{
    room:streamId,
    role:"camera"
  });

  location.href = `camera-live.html?stream=${streamId}`;
}
</script>

</body>
</html>
