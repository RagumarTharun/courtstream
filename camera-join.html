<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera Join</title>
<style>
body{margin:0;background:#0f1115;color:#e6e6eb;font-family:system-ui}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{width:420px}
video{width:100%;aspect-ratio:16/9;background:#000;border-radius:16px}
.controls{display:flex;gap:8px;margin-top:10px}
button,input{flex:1;padding:8px;border-radius:999px;border:1px solid #262b3d;background:#161922;color:#e6e6eb}
.primary{background:#3b82f6;border:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="box">
    <video id="v" autoplay muted playsinline></video>
    <div class="controls">
      <button onclick="toggleCam()">Cam</button>
      <button onclick="toggleMic()">Mic</button>
      <button onclick="flip()">Flip</button>
    </div>
    <div class="controls">
      <input type="range" min="1" max="3" step="0.1" onchange="zoom(this.value)">
    </div>
    <button class="primary" onclick="join()">Join Stream</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const streamId=new URLSearchParams(location.search).get("stream");
let stream,videoOn=true,micOn=true,facing="environment";
const socket=io();
const pc=new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

async function join(){
  stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:facing},
    audio:true
  });
  v.srcObject=stream;
  stream.getTracks().forEach(t=>pc.addTrack(t,stream));
  socket.emit("join",{room:streamId,role:"camera"});
}

function toggleCam(){ videoOn=!videoOn; stream.getVideoTracks()[0].enabled=videoOn; }
function toggleMic(){ micOn=!micOn; stream.getAudioTracks()[0].enabled=micOn; }
function flip(){ facing=facing==="user"?"environment":"user"; join(); }
function zoom(z){
  const t=stream.getVideoTracks()[0];
  t.applyConstraints({advanced:[{zoom:z}]});
}

pc.onicecandidate=e=>e.candidate&&socket.emit("signal",{data:{candidate:e.candidate}});
socket.on("signal",async({from,data})=>{
  if(data.sdp){
    await pc.setRemoteDescription(data.sdp);
    if(data.sdp.type==="offer"){
      const ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);
      socket.emit("signal",{to:from,data:{sdp:ans}});
    }
  }
  if(data.candidate) await pc.addIceCandidate(data.candidate);
});
</script>
</body>
</html>
