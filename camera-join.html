<!DOCTYPE html>
<html>
<head>
  <title>Camera Pre-Join</title>
  <link rel="stylesheet" href="theme.css">
</head>
<body style="padding:20px;display:flex;flex-direction:column;align-items:center">

<p style="color:var(--danger)">
  Keep camera in LANDSCAPE mode for better scalability
</p>

<video id="preview" autoplay muted playsinline
       style="width:360px;aspect-ratio:16/9;background:black;border-radius:12px"></video>

<div style="margin:16px;display:flex;gap:8px">
  <button onclick="toggleCam()">Camera</button>
  <button onclick="flip()">Flip</button>
</div>

<select id="position">
  <option value="center">Center</option>
  <option value="left">Left</option>
  <option value="right">Right</option>
  <option value="benchA">Bench A</option>
  <option value="benchB">Bench B</option>
  <option value="moving">Moving</option>
</select>

<br><br>
<button class="primary" onclick="joinAsCamera()">
  Join CourtStream
</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const params = new URLSearchParams(location.search);
const room = params.get("room") || "courtstream-demo";

let stream;
let facing = "environment";

async function start() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facing },
    audio: false
  });
  preview.srcObject = stream;
}

function flip() {
  facing = facing === "environment" ? "user" : "environment";
  start();
}

function toggleCam() {
  const track = stream.getVideoTracks()[0];
  track.enabled = !track.enabled;
}

function joinAsCamera() {
  const pos = document.getElementById("position").value;
  sessionStorage.setItem("cameraPosition", pos);
  sessionStorage.setItem("role", "camera");
  location.href = `phone.html?room=${room}`;
}

start();
</script>

</body>
</html>
