<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera Join</title>
<style>
body{margin:0;background:#0f1115;color:#e6e6eb;font-family:system-ui}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:720px}
.preview{height:400px;background:#000;border-radius:16px;border:1px solid #262b3d}
.controls{display:flex;justify-content:space-between;margin-top:14px}
select,button{padding:10px 14px;border-radius:999px;border:1px solid #262b3d;background:#161922;color:#e6e6eb}
.primary{background:#3b82f6;border:none}
</style>
</head>
<body>
<div class="page">
  <div class="wrap">
    <div class="preview"></div>

    <div class="controls">
      <select id="pos">
        <option>Center</option>
        <option>Left</option>
        <option>Right</option>
        <option>Bench A</option>
        <option>Bench B</option>
        <option>Moving</option>
      </select>

      <button class="primary" onclick="join()">Join</button>
    </div>
  </div>
</div>

<script>
const params=new URLSearchParams(location.search);
function join(){
  localStorage.setItem('cameraPosition',pos.value);
  location.href=`director.html?stream=${params.get('stream')}`;
}
</script>
</body>
</html>
