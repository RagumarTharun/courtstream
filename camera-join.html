<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Join as Camera</title>
<style>
body{margin:0;background:#0f1115;color:#e6e6eb;font-family:system-ui;
display:flex;align-items:center;justify-content:center;height:100vh}
.wrap{width:100%;max-width:420px;padding:16px}
.preview{aspect-ratio:16/9;background:#000;border:1px solid #262b3d;border-radius:16px}
.preview video{width:100%;height:100%;object-fit:cover}
.controls{margin-top:12px;display:flex;gap:10px}
select,button{flex:1;padding:10px;border-radius:999px;background:#161922;border:1px solid #262b3d;color:#e6e6eb}
.primary{background:#3b82f6;border:none}
</style>
</head>

<body>
<div class="wrap">
  <div class="preview"><video id="local" autoplay muted playsinline></video></div>
  <div class="controls">
    <select id="pos">
      <option value="center">Center</option>
      <option value="left">Left</option>
      <option value="right">Right</option>
      <option value="benchA">Bench A</option>
      <option value="benchB">Bench B</option>
      <option value="moving">Moving</option>
    </select>
  </div>
  <div class="controls">
    <button class="primary" id="join">Join</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const params=new URLSearchParams(location.search);
const ROOM=params.get("stream");
if(!ROOM){alert("Invalid stream");location.href="/"}

const socket=io();
const pc=new RTCPeerConnection();
let localStream;

document.getElementById("join").onclick=async()=>{
  localStream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment",width:1280,height:720},
    audio:true
  });
  document.getElementById("local").srcObject=localStream;
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  socket.emit("join",{room:ROOM,role:"camera",position:pos.value});
};

pc.onicecandidate=e=>{
  if(e.candidate) socket.emit("signal",{data:{candidate:e.candidate}});
};

socket.on("signal",async({data})=>{
  if(data.sdp){
    await pc.setRemoteDescription(data.sdp);
    if(data.sdp.type==="offer"){
      const ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);
      socket.emit("signal",{data:{sdp:ans}});
    }
  }
  if(data.candidate) await pc.addIceCandidate(data.candidate);
});
</script>
</body>
</html>
