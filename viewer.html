<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viewer</title>
<style>
body{margin:0;background:#000}
video{width:100vw;height:100vh;object-fit:contain}
</style>
</head>
<body>
<video id="v" autoplay playsinline></video>

<script src="/socket.io/socket.io.js"></script>
<script>
const s=new URLSearchParams(location.search).get("stream");
const socket=io();
const pc=new RTCPeerConnection({
  iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});
socket.emit("join",{room:s,role:"viewer"});
pc.ontrack=e=>v.srcObject=e.streams[0];
pc.onicecandidate=e=>e.candidate&&socket.emit("signal",{data:{candidate:e.candidate}});
socket.on("signal",async({from,data})=>{
  if(data.sdp){
    await pc.setRemoteDescription(data.sdp);
    if(data.sdp.type==="offer"){
      const ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);
      socket.emit("signal",{to:from,data:{sdp:ans}});
    }
  }
  if(data.candidate) await pc.addIceCandidate(data.candidate);
});
</script>
</body>
</html>
