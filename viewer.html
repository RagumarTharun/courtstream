<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viewer</title>
<style>
body{margin:0;background:#000}
video{width:100vw;height:100vh;object-fit:contain}
</style>
</head>
<body>
<video id="v" autoplay playsinline></video>

<script src="/socket.io/socket.io.js"></script>
<script>
const s=new URLSearchParams(location.search).get("stream");
const socket=io();
const pc=new RTCPeerConnection({
  iceServers: [
    {
      urls: [
        "stun:stun.cloudflare.com:3478",
        "stun:stun.cloudflare.com:53"
      ]
    },
    {
      urls: [
        "turn:turn.cloudflare.com:3478?transport=udp",
        "turn:turn.cloudflare.com:3478?transport=tcp",
        "turns:turn.cloudflare.com:5349?transport=tcp",
        "turn:turn.cloudflare.com:53?transport=udp",
        "turn:turn.cloudflare.com:80?transport=tcp",
        "turns:turn.cloudflare.com:443?transport=tcp"
      ],
      username: "g07ef1b745ad2a747da14d563e4bfbd538f21945297c2fad25578fb243c68286",
      credential: "3882b29cc1772be95d469efdb14ccd45ed1b79ec8c52d9e0d8070720e093b43d"
    }
  ]
});
socket.emit("join",{room:s,role:"viewer"});
pc.ontrack=e=>v.srcObject=e.streams[0];
pc.onicecandidate=e=>e.candidate&&socket.emit("signal",{data:{candidate:e.candidate}});
socket.on("signal",async({from,data})=>{
  if(data.sdp){
    await pc.setRemoteDescription(data.sdp);
    if(data.sdp.type==="offer"){
      const ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);
      socket.emit("signal",{to:from,data:{sdp:ans}});
    }
  }
  if(data.candidate) await pc.addIceCandidate(data.candidate);
});
</script>
</body>
</html>
