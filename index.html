<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CourtStream</title>
<style>
body{margin:0;background:#0f1115;color:#e6e6eb;font-family:system-ui}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:420px;background:#161922;border:1px solid #262b3d;border-radius:16px;padding:28px}
input,button{width:100%;margin-top:14px;padding:10px;border-radius:999px;border:1px solid #262b3d;background:#0f1115;color:#e6e6eb}
.primary{background:#3b82f6;border:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h2>CourtStream</h2>
    <input id="stream" placeholder="Enter Stream ID">
    <button class="primary" onclick="join()">Join</button>
    <button onclick="location.href='create.html'">Create CourtStream</button>
  </div>
</div>

<script>
async function join(){
  if(!stream.value) return;
  const res = await fetch(`/api/streams/${stream.value}`);
  if(!res.ok) return alert("Stream not found");
  location.href = `join.html?stream=${stream.value}`;
}
</script>
</body>
</html>
