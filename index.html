<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CourtStream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- KEEP YOUR EXISTING CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1 id="title">Welcome to CourtStream</h1>
  <p id="subtitle">Discover live sports streams or create your own.</p>

  <div id="auth-buttons"></div>

  <input
    id="search"
    type="text"
    placeholder="Search streams (e.g. JBA, Final, Court 1)"
  />

  <div id="streams"></div>

<script>
/* =========================
   AUTH STATE
========================= */
async function loadAuth() {
  const box = document.getElementById("auth-buttons");

  try {
    const res = await fetch("/me");
    if (!res.ok) throw new Error();

    const user = await res.json();

    document.getElementById("title").innerText =
      `Hello ${user.email}`;
    document.getElementById("subtitle").innerText =
      "Pick a stream to join or create your own.";

    box.innerHTML = `
      <button onclick="location.href='create.html'">
        Create Stream
      </button>
      <button onclick="logout()">Logout</button>
    `;
  } catch {
    box.innerHTML = `
      <button onclick="location.href='login.html'">Login</button>
      <button onclick="location.href='register.html'">Register</button>
    `;
  }
}

/* =========================
   LOAD STREAMS
========================= */
let allStreams = [];

async function loadStreams() {
  const res = await fetch("/api/streams");
  const rows = await res.json();

  // 🔒 HARDENED: handle all shapes safely
  allStreams = rows
    .map(r => typeof r === "string" ? r : r?.name)
    .filter(Boolean);

  renderStreams(allStreams);
}

function renderStreams(list) {
  const container = document.getElementById("streams");
  container.innerHTML = "";

  if (!list.length) {
    container.innerHTML = "<p>No streams available</p>";
    return;
  }

  list.forEach(name => {
    const div = document.createElement("div");
    div.className = "stream"; // <-- YOUR OLD CLASS
    div.innerHTML = `
      <span>${name}</span>
      <button>Join</button>
    `;
    div.onclick = () => {
      location.href = `join.html?stream=${encodeURIComponent(name)}`;
    };
    container.appendChild(div);
  });
}

/* =========================
   SEARCH
========================= */
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  renderStreams(
    allStreams.filter(s => s.toLowerCase().includes(q))
  );
});

/* =========================
   LOGOUT
========================= */
async function logout() {
  await fetch("/logout", { method: "POST" });
  location.reload();
}

/* INIT */
loadAuth();
loadStreams();
</script>

</body>
</html>
