<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>CourtStream</title>
<style>
body{margin:0;background:#0f1115;color:#e6e6eb;font-family:system-ui}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:520px;background:#161922;border:1px solid #262b3d;border-radius:16px;padding:32px}
h1{margin:0 0 12px}
input{width:100%;padding:12px;border-radius:12px;background:#0f1115;border:1px solid #262b3d;color:#e6e6eb}
.actions{display:flex;justify-content:space-between;margin-top:20px}
button{padding:10px 18px;border-radius:999px;border:none;cursor:pointer}
.primary{background:#3b82f6;color:#fff}
.secondary{background:transparent;border:1px solid #262b3d;color:#e6e6eb}
</style>
</head>

<body>
<div class="page">
  <div class="card">
    <h1>Welcome to CourtStream</h1>
    <p>Find an active court stream near you</p>
    <input placeholder="Search court streams…" />

    <div class="actions">
      <button class="secondary" onclick="location.href='login.html'">Login</button>
      <button class="primary" onclick="location.href='create.html'">Create CourtStream</button>
    </div>
  </div>
</div>
</body>
</html>
