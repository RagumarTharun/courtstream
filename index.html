<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CourtStream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="theme.css" />
</head>

<body>

<div class="container">
  <h1 id="greeting">Welcome to CourtStream</h1>
  <p class="subtitle" id="subtitle">
    Discover live sports streams or create your own.
  </p>

  <div class="actions" id="actions"></div>

  <input
    id="search"
    class="search"
    placeholder="Search streams (e.g. JBA, Final, Court 1)"
    autocomplete="off"
  />

  <div class="stream-list" id="streamList"></div>
</div>

<script>
let allStreams = [];
let loggedIn = false;

/* ======================
   AUTH STATE
====================== */
async function checkAuth() {
  const actions = document.getElementById("actions");

  try {
    const res = await fetch("/me");
    if (!res.ok) throw new Error();

    const user = await res.json();
    loggedIn = true;

    document.getElementById("greeting").innerText =
      `Hello ${user.email}`;
    document.getElementById("subtitle").innerText =
      "Pick a stream to join or create your own.";

    actions.innerHTML = `
      <button class="primary" onclick="location.href='create.html'">
        + Create Stream
      </button>
      <button class="secondary" onclick="logout()">
        Logout
      </button>
    `;
  } catch {
    actions.innerHTML = `
      <button class="primary" onclick="location.href='login.html'">
        Login
      </button>
      <button class="secondary" onclick="location.href='register.html'">
        Register
      </button>
    `;
  }
}

/* ======================
   LOAD STREAMS
====================== */
async function loadStreams() {
  const res = await fetch("/api/streams");
  const rows = await res.json();

  // 🔧 FIX: normalize DB rows → string names
  allStreams = rows
    .map(r => r.name)
    .filter(Boolean);

  renderStreams(allStreams);
}

function renderStreams(list) {
  const box = document.getElementById("streamList");
  box.innerHTML = "";

  if (!list.length) {
    box.innerHTML = `<div class="empty">No streams available</div>`;
    return;
  }

  list.forEach(name => {
    const div = document.createElement("div");
    div.className = "stream-item";
    div.innerHTML = `
      <span class="stream-name">${name}</span>
      <span class="join">Join →</span>
    `;
    div.onclick = () => {
      location.href = `join.html?stream=${encodeURIComponent(name)}`;
    };
    box.appendChild(div);
  });
}

/* ======================
   SEARCH
====================== */
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  renderStreams(
    allStreams.filter(s => s.toLowerCase().includes(q))
  );
});

/* ======================
   LOGOUT
====================== */
async function logout() {
  await fetch("/logout", { method: "POST" });
  location.reload();
}

/* INIT */
checkAuth();
loadStreams();
</script>

</body>
</html>
