<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CourtStream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- KEEP EXACTLY WHAT YOUR OLD FILE HAD -->
  <link rel="stylesheet" href="index.css" />
</head>

<body>

  <h1 id="title">Welcome to CourtStream</h1>
  <p id="subtitle">Discover live sports streams or create your own.</p>

  <div id="auth"></div>

  <input
    id="search"
    type="text"
    placeholder="Search streams (e.g. JBA, Final, Court 1)"
  />

  <div id="streamList"></div>

<script>
let allStreams = [];

/* =========================
   AUTH CHECK (ROBUST)
========================= */
async function loadAuth() {
  const box = document.getElementById("auth");

  try {
    const res = await fetch("/me");
    if (!res.ok) throw new Error("not logged");

    const data = await res.json();

    // 🔒 HANDLE ALL POSSIBLE SHAPES
    const email =
      data.email ||
      data.user?.email ||
      data.username ||
      null;

    if (!email) throw new Error("no identity");

    document.getElementById("title").innerText =
      `Hello ${email}`;
    document.getElementById("subtitle").innerText =
      "Pick a stream to join or create your own.";

    box.innerHTML = `
      <button onclick="location.href='create.html'">
        Create Stream
      </button>
      <button onclick="logout()">Logout</button>
    `;
  } catch {
    box.innerHTML = `
      <button onclick="location.href='login.html'">Login</button>
      <button onclick="location.href='register.html'">Register</button>
    `;
  }
}

/* =========================
   STREAMS
========================= */
async function loadStreams() {
  const res = await fetch("/api/streams");
  const rows = await res.json();

  allStreams = rows
    .map(r => typeof r === "string" ? r : r?.name)
    .filter(Boolean);

  renderStreams(allStreams);
}

function renderStreams(list) {
  const box = document.getElementById("streamList");
  box.innerHTML = "";

  if (!list.length) {
    box.innerHTML = "<p>No streams found</p>";
    return;
  }

  list.forEach(name => {
    const row = document.createElement("div");
    row.className = "stream"; // YOUR EXISTING CLASS
    row.innerHTML = `
      <span>${name}</span>
      <span>Join →</span>
    `;
    row.onclick = () => {
      location.href = `join.html?stream=${encodeURIComponent(name)}`;
    };
    box.appendChild(row);
  });
}

/* =========================
   SEARCH
========================= */
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  renderStreams(
    allStreams.filter(s => s.toLowerCase().includes(q))
  );
});

/* =========================
   LOGOUT
========================= */
async function logout() {
  await fetch("/logout", { method: "POST" });
  location.reload();
}

/* INIT */
loadAuth();
loadStreams();
</script>

</body>
</html>
